name: ${SITE_ID:-site-a}-message-gatekeeper

services:
  message-gatekeeper:
    build:
      context: ../..
      dockerfile: message-gatekeeper/deploy/Dockerfile
    container_name: ${SITE_ID:-site-a}-message-gatekeeper
    environment:
      - SITE_ID=${SITE_ID:-site-a}
      - NATS_URL=nats://${NATS_HOST:-nats-a}:4222
      - NATS_CREDS_FILE=/etc/nats/backend.creds
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=chat_${SITE_ID:-site-a}
      - CHAT_BASE_URL=http://localhost:3000
      - BOOTSTRAP_STREAMS=true
    volumes:
      - ../../docker-local/${SITE_ID:-site-a}/backend.creds:/etc/nats/backend.creds:ro
    networks:
      - chat-local

networks:
  chat-local:
    external: true
