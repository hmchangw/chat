services:
  nats:
    image: nats:2.11-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--jetstream", "--http_port", "8222"]

  cassandra:
    image: cassandra:4.1
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=chat-dev

  message-worker:
    build:
      context: ../..
      dockerfile: message-worker/deploy/Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
      - SITE_ID=site-local
      - CASSANDRA_HOSTS=cassandra
      - CASSANDRA_KEYSPACE=chat
    depends_on:
      - nats
      - cassandra
