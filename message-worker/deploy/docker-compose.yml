services:
  nats:
    image: nats:2.11-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--jetstream", "--http_port", "8222"]

  mongodb:
    image: mongo:8
    ports:
      - "27017:27017"

  cassandra:
    image: cassandra:5
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=chat-dev
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "DESCRIBE KEYSPACES"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  cassandra-init:
    image: cassandra:5
    depends_on:
      cassandra:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        cqlsh cassandra <<'CQL'
        CREATE KEYSPACE IF NOT EXISTS chat WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};
        CREATE TYPE IF NOT EXISTS chat."Participant" (
          id TEXT,
          eng_name TEXT,
          company_name TEXT,
          app_id TEXT,
          app_name TEXT,
          is_bot BOOLEAN,
          account TEXT
        );
        CREATE TYPE IF NOT EXISTS chat."Card" (
          template TEXT,
          data BLOB
        );
        CREATE TYPE IF NOT EXISTS chat."CardAction" (
          verb TEXT,
          text TEXT,
          card_id TEXT,
          display_text TEXT,
          hide_exec_log BOOLEAN,
          card_tmid TEXT,
          data BLOB
        );
        CREATE TYPE IF NOT EXISTS chat."File" (
          id TEXT,
          name TEXT,
          type TEXT
        );
        CREATE TYPE IF NOT EXISTS chat."QuotedParentMessage" (
          message_id TEXT,
          room_id TEXT,
          sender FROZEN<"Participant">,
          created_at TIMESTAMP,
          msg TEXT,
          mentions SET<FROZEN<"Participant">>,
          attachments LIST<BLOB>,
          message_link TEXT
        );
        CREATE TABLE IF NOT EXISTS chat.messages_by_room (
          room_id TEXT,
          created_at TIMESTAMP,
          message_id TEXT,
          sender FROZEN<"Participant">,
          target_user FROZEN<"Participant">,
          msg TEXT,
          mentions SET<FROZEN<"Participant">>,
          attachments LIST<BLOB>,
          file FROZEN<"File">,
          card FROZEN<"Card">,
          card_action FROZEN<"CardAction">,
          tshow BOOLEAN,
          thread_parent_id TEXT,
          thread_parent_created_at TIMESTAMP,
          quoted_parent_message FROZEN<"QuotedParentMessage">,
          visible_to TEXT,
          unread BOOLEAN,
          reactions MAP<TEXT, FROZEN<SET<FROZEN<"Participant">>>>,
          deleted BOOLEAN,
          type TEXT,
          sys_msg_data BLOB,
          site_id TEXT,
          edited_at TIMESTAMP,
          updated_at TIMESTAMP,
          PRIMARY KEY ((room_id), created_at, message_id)
        ) WITH CLUSTERING ORDER BY (created_at DESC, message_id DESC);
        CREATE TABLE IF NOT EXISTS chat.thread_messages_by_room (
          room_id TEXT,
          thread_room_id TEXT,
          created_at TIMESTAMP,
          message_id TEXT,
          thread_parent_id TEXT,
          sender FROZEN<"Participant">,
          target_user FROZEN<"Participant">,
          msg TEXT,
          mentions SET<FROZEN<"Participant">>,
          attachments LIST<BLOB>,
          file FROZEN<"File">,
          card FROZEN<"Card">,
          card_action FROZEN<"CardAction">,
          quoted_parent_message FROZEN<"QuotedParentMessage">,
          visible_to TEXT,
          unread BOOLEAN,
          reactions MAP<TEXT, FROZEN<SET<FROZEN<"Participant">>>>,
          deleted BOOLEAN,
          type TEXT,
          sys_msg_data BLOB,
          site_id TEXT,
          edited_at TIMESTAMP,
          updated_at TIMESTAMP,
          PRIMARY KEY ((room_id), thread_room_id, created_at, message_id)
        ) WITH CLUSTERING ORDER BY (thread_room_id DESC, created_at DESC, message_id DESC);
        CREATE TABLE IF NOT EXISTS chat.pinned_messages_by_room (
          room_id TEXT,
          created_at TIMESTAMP,
          message_id TEXT,
          sender FROZEN<"Participant">,
          target_user FROZEN<"Participant">,
          msg TEXT,
          mentions SET<FROZEN<"Participant">>,
          attachments LIST<BLOB>,
          file FROZEN<"File">,
          card FROZEN<"Card">,
          card_action FROZEN<"CardAction">,
          quoted_parent_message FROZEN<"QuotedParentMessage">,
          visible_to TEXT,
          unread BOOLEAN,
          reactions MAP<TEXT, FROZEN<SET<FROZEN<"Participant">>>>,
          deleted BOOLEAN,
          type TEXT,
          sys_msg_data BLOB,
          site_id TEXT,
          edited_at TIMESTAMP,
          updated_at TIMESTAMP,
          pinned_by FROZEN<"Participant">,
          PRIMARY KEY ((room_id), created_at, message_id)
        ) WITH CLUSTERING ORDER BY (created_at DESC, message_id DESC);
        CREATE TABLE IF NOT EXISTS chat.messages_by_id (
          message_id TEXT,
          room_id TEXT,
          thread_room_id TEXT,
          sender FROZEN<"Participant">,
          target_user FROZEN<"Participant">,
          msg TEXT,
          mentions SET<FROZEN<"Participant">>,
          attachments LIST<BLOB>,
          file FROZEN<"File">,
          card FROZEN<"Card">,
          card_action FROZEN<"CardAction">,
          tshow BOOLEAN,
          thread_parent_id TEXT,
          thread_parent_created_at TIMESTAMP,
          quoted_parent_message FROZEN<"QuotedParentMessage">,
          visible_to TEXT,
          unread BOOLEAN,
          reactions MAP<TEXT, FROZEN<SET<FROZEN<"Participant">>>>,
          deleted BOOLEAN,
          type TEXT,
          sys_msg_data BLOB,
          site_id TEXT,
          edited_at TIMESTAMP,
          created_at TIMESTAMP,
          updated_at TIMESTAMP,
          pinned_at TIMESTAMP,
          pinned_by FROZEN<"Participant">,
          PRIMARY KEY (message_id, created_at)
        ) WITH CLUSTERING ORDER BY (created_at DESC);
        CQL
        echo "Schema initialized successfully"

  message-worker:
    build:
      context: ../..
      dockerfile: message-worker/deploy/Dockerfile
    pull_policy: build
    environment:
      - NATS_URL=nats://nats:4222
      - SITE_ID=site-local
      - CASSANDRA_HOSTS=cassandra
      - CASSANDRA_KEYSPACE=chat
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=chat
    depends_on:
      nats:
        condition: service_started
      mongodb:
        condition: service_started
      cassandra-init:
        condition: service_completed_successfully
