name: ${SITE_ID:-site-a}-search-sync-worker

services:
  search-sync-worker:
    build:
      context: ../..
      dockerfile: search-sync-worker/deploy/Dockerfile
    container_name: ${SITE_ID:-site-a}-search-sync-worker
    environment:
      - SITE_ID=${SITE_ID:-site-a}
      - NATS_URL=nats://${NATS_HOST:-nats-a}:4222
      - NATS_CREDS_FILE=/etc/nats/backend.creds
      - SEARCH_URL=http://elasticsearch:9200
      - SEARCH_BACKEND=elasticsearch
      - MSG_INDEX_PREFIX=messages-${SITE_ID:-site-a}-v1
      - SPOTLIGHT_INDEX=spotlight-${SITE_ID:-site-a}-v1
      - USER_ROOM_INDEX=user-room-mv-${SITE_ID:-site-a}
      - BOOTSTRAP_STREAMS=true
    volumes:
      - ../../docker-local/${SITE_ID:-site-a}/backend.creds:/etc/nats/backend.creds:ro
    networks:
      - chat-local

networks:
  chat-local:
    external: true
