<text x="1125" y="664" text-anchor="middle" font-size="15" font-weight="bold" fill="#263238">Valkey + Mongo</text>
<text x="1125" y="681" text-anchor="middle" font-size="13" font-weight="normal" fill="#263238">sessions · credentials</text>
<text x="50" y="862" font-size="12" fill="#37474F">• No URL change: the chat domain stays the front door (DNS + TLS cert unchanged on the bot-facing side).</text>
<text x="50" y="880" font-size="12" fill="#37474F">• Canary: shift the chat-gateway VirtualService weight chat -> nextgen (cross-cluster to wsp gateway). Rollback: shift weight back (instant).</text>
<text x="50" y="898" font-size="12" fill="#37474F">• wsp gateway accepts the chat host so forwarded chat-domain traffic routes to nextgen. Final state (optional): repoint DNS to wsp gateway, retire chat gateway.</text>
