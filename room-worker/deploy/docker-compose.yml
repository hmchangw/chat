name: room-worker

services:
  room-worker:
    build:
      context: ../..
      dockerfile: room-worker/deploy/Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
      - NATS_CREDS_FILE=/etc/nats/backend.creds
      - SITE_ID=site-local
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=chat
      # Valkey is required (room-worker refuses to start without VALKEY_ADDRS).
      # Provided by docker-local/compose.deps.yaml; production deploys must supply it externally.
      # Cluster mode: comma-separate seed nodes, e.g. host1:6379,host2:6379,host3:6379.
      - VALKEY_ADDRS=valkey:6379
      - VALKEY_KEY_GRACE_PERIOD=24h
      - BOOTSTRAP_STREAMS=true
    volumes:
      - ../../docker-local/backend.creds:/etc/nats/backend.creds:ro
    networks:
      - chat-local

networks:
  chat-local:
    external: true
