name: ${SITE_ID:-site-a}-room-worker

services:
  room-worker:
    build:
      context: ../..
      dockerfile: room-worker/deploy/Dockerfile
    container_name: ${SITE_ID:-site-a}-room-worker
    environment:
      - SITE_ID=${SITE_ID:-site-a}
      - NATS_URL=nats://${NATS_HOST:-nats-a}:4222
      - NATS_CREDS_FILE=/etc/nats/backend.creds
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=chat_${SITE_ID:-site-a}
      # Valkey cluster is required (room-worker refuses to start without VALKEY_ADDRS).
      # Provided by docker-local/compose.deps.yaml; production deploys must supply it externally.
      - VALKEY_ADDRS=valkey:6379
      - VALKEY_KEY_GRACE_PERIOD=24h
      - BOOTSTRAP_STREAMS=true
    volumes:
      - ../../docker-local/${SITE_ID:-site-a}/backend.creds:/etc/nats/backend.creds:ro
    networks:
      - chat-local

networks:
  chat-local:
    external: true
