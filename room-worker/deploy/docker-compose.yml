name: room-worker

services:
  mongodb:
    image: mongo:8
    ports:
      - "27017:27017"

  room-worker:
    build:
      context: ../..
      dockerfile: room-worker/deploy/Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
      - NATS_CREDS_FILE=/etc/nats/backend.creds
      - SITE_ID=site-local
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=chat
    volumes:
      - ../../docker-local/backend.creds:/etc/nats/backend.creds:ro
    depends_on:
      - mongodb
    networks:
      - chat-local
      - default

networks:
  chat-local:
    external: true
