name: ${SITE_ID:-site-a}-broadcast-worker

services:
  broadcast-worker:
    build:
      context: ../..
      dockerfile: broadcast-worker/deploy/Dockerfile
    container_name: ${SITE_ID:-site-a}-broadcast-worker
    environment:
      - SITE_ID=${SITE_ID:-site-a}
      - NATS_URL=nats://${NATS_HOST:-nats-a}:4222
      - NATS_CREDS_FILE=/etc/nats/backend.creds
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=chat_${SITE_ID:-site-a}
      # In-process user cache. Defaults: 10000 entries, 5m TTL.
      # Set USER_CACHE_SIZE=0 to disable caching.
      - USER_CACHE_SIZE=10000
      - USER_CACHE_TTL=5m
      - VALKEY_ADDRS=valkey:6379
      - VALKEY_KEY_GRACE_PERIOD=24h
      - BOOTSTRAP_STREAMS=true
      - ENCRYPTION_ENABLED=${ENCRYPTION_ENABLED:-false}
    volumes:
      - ../../docker-local/${SITE_ID:-site-a}/backend.creds:/etc/nats/backend.creds:ro
    networks:
      - chat-local

networks:
  chat-local:
    external: true
