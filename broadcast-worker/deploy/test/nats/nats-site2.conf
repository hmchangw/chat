server_name: site2
listen: 0.0.0.0:4222
http_port: 8222

jetstream {
  store_dir: /tmp/nats/jetstream
}

cluster {
  name: site2
  port: 6222
  routes: [ "nats-route://127.0.0.1:6222" ]
}

gateway {
  name: site2
  listen: 0.0.0.0:7222
  gateways: [
    { name: site1, url: "nats://nats_site1:7222" }
  ]
}
