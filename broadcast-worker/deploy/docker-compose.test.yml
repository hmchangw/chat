services:
  nats_site1:
    image: nats:2.11-alpine
    command: ["-c", "/etc/nats/nats.conf"]
    volumes:
      - ./test/nats/nats-site1.conf:/etc/nats/nats.conf:ro
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--spider", "http://localhost:8222/healthz?js-meta-only=true"]
      interval: 2s
      timeout: 2s
      retries: 30
      start_period: 5s

  nats_site2:
    image: nats:2.11-alpine
    command: ["-c", "/etc/nats/nats.conf"]
    volumes:
      - ./test/nats/nats-site2.conf:/etc/nats/nats.conf:ro
    ports:
      - "4223:4222"
      - "8223:8222"

  mongodb:
    image: mongo:8
    ports:
      - "27017:27017"

  broadcast-worker:
    build:
      context: ../..
      dockerfile: broadcast-worker/deploy/Dockerfile
    environment:
      - NATS_URL=nats://nats_site1:4222
      - SITE_ID=site1
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=chat
    depends_on:
      nats_site1:
        condition: service_healthy
      mongodb:
        condition: service_started

  tools:
    image: natsio/nats-box:latest
    command: ["sleep", "infinity"]
    depends_on:
      - nats_site1
      - nats_site2
