trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - search-service/
      - pkg/

pr:
  branches:
    include:
      - main
  paths:
    include:
      - search-service/
      - pkg/

variables:
  # Aligned with .github/workflows/ci.yml; the April 7, 2026 security
  # release covers 10 CVEs. The Dockerfile builder stays on 1.25.8-alpine
  # per the repo-wide image pin — CI toolchain and builder base are
  # independent concerns.
  GO_VERSION: '1.25.9'
  SERVICE_NAME: search-service
  REGISTRY: '$(containerRegistry)'
  # Per-target coverage thresholds. Both pkg and service meet the
  # repo-wide 80% minimum. main.go is excluded from the service profile
  # below because it's a startup-harness (config parse → DI wire →
  # goroutine spawn → shutdown.Wait hand-off) covered only by the
  # integration job — leaving it in would drag the unit number without
  # representing an actual unit-test gap.
  MIN_COVERAGE_PKG: '80'
  MIN_COVERAGE_SERVICE: '80'

stages:
  - stage: Validate
    displayName: 'Lint & Test'
    jobs:
      - job: LintAndTest
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: GoTool@0
            inputs:
              version: '$(GO_VERSION)'
            displayName: 'Install Go $(GO_VERSION)'

          - script: go vet ./$(SERVICE_NAME)/... ./pkg/...
            displayName: 'Go Vet'

          - script: |
              set -euo pipefail
              go test ./pkg/... -v -race -coverprofile=coverage-pkg.out
              cov="$(go tool cover -func=coverage-pkg.out | awk '/^total:/ {gsub("%","",$3); print $3}')"
              echo "pkg coverage: ${cov}% (threshold ${MIN_COVERAGE_PKG}%)"
              awk -v c="$cov" -v t="$MIN_COVERAGE_PKG" 'BEGIN { exit (c >= t ? 0 : 1) }'
            displayName: 'Test shared packages (with coverage gate)'

          - script: |
              set -euo pipefail
              go test ./$(SERVICE_NAME)/... -v -race -coverprofile=coverage-$(SERVICE_NAME)-raw.out
              # Filter out main.go before computing the total. The first
              # line of a cover profile is `mode: atomic` and must be
              # preserved verbatim.
              awk 'NR==1 || $0 !~ "/main\\.go:"' coverage-$(SERVICE_NAME)-raw.out > coverage-$(SERVICE_NAME).out
              cov="$(go tool cover -func=coverage-$(SERVICE_NAME).out | awk '/^total:/ {gsub("%","",$3); print $3}')"
              echo "$(SERVICE_NAME) coverage (excl. main.go): ${cov}% (threshold ${MIN_COVERAGE_SERVICE}%)"
              awk -v c="$cov" -v t="$MIN_COVERAGE_SERVICE" 'BEGIN { exit (c >= t ? 0 : 1) }'
            displayName: 'Test $(SERVICE_NAME) (with coverage gate)'

          - script: go build -o /dev/null ./$(SERVICE_NAME)/
            displayName: 'Build $(SERVICE_NAME)'

  - stage: Build
    displayName: 'Build & Push Image'
    dependsOn: Validate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: BuildImage
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: Docker@2
            inputs:
              containerRegistry: '$(containerRegistry)'
              repository: 'chat/$(SERVICE_NAME)'
              command: 'buildAndPush'
              Dockerfile: '$(SERVICE_NAME)/deploy/Dockerfile'
              buildContext: '.'
              tags: |
                $(Build.BuildId)
                latest
            displayName: 'Build & push $(SERVICE_NAME)'
