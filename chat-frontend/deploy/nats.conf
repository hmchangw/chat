# NATS server config for chat-frontend local development.
# NOTE: No auth configured — runs in open mode. Any client can connect,
# publish, and subscribe to any subject. The JWTs issued by auth-service
# are not enforced by NATS in this config. This is intentional for local
# development; production requires operator/account/resolver configuration.
listen: 0.0.0.0:4222

http_port: 8222

jetstream {
  store_dir: /data/jetstream
}

websocket {
  listen: "0.0.0.0:4223"
  no_tls: true
}
