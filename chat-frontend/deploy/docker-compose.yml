name: chat-frontend

services:
  chat-frontend:
    build:
      context: ../..
      dockerfile: chat-frontend/deploy/Dockerfile
    environment:
      AUTH_URL: ${AUTH_URL:-http://localhost:8080}
      NATS_URL: ${NATS_URL:-ws://localhost:9222}
      DEFAULT_SITE_ID: ${DEFAULT_SITE_ID:-site-local}
    ports:
      - "3000:80"
    networks:
      - chat-local

networks:
  chat-local:
    external: true
