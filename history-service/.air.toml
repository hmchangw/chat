root = "."
tmp_dir = "tmp/history-service"

# history-service has its entry point under cmd/ — keep this in sync
# with history-service/deploy/Dockerfile.
[build]
  cmd = "go build -o ./tmp/history-service/bin ./history-service/cmd"
  bin = "./tmp/history-service/bin"
  include_ext = ["go"]
  exclude_dir = ["tmp", "bin", "node_modules", "testdata", "chat-frontend", "docs", "docker-local"]
  exclude_regex = ["_test\\.go$", "mock_.*\\.go$"]
  delay = 500
  kill_delay = "2s"
  send_interrupt = true
  stop_on_error = false

[log]
  time = true

[misc]
  clean_on_exit = false
