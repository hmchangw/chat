# Local development environment for history-service.
# Starts NATS, MongoDB, Cassandra, initializes schema, and runs the service.
#
# Usage:
#   cd history-service/docker-local
#   docker compose up -d            # start everything
#   docker compose logs -f history  # follow service logs
#   docker compose down             # stop all services
#   docker compose down -v          # stop and remove volumes (clean slate)


services:
  nats:
    image: nats:2.11-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--jetstream", "--http_port", "8222"]
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  mongodb:
    image: mongo:8
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 3s
      retries: 5

  cassandra:
    image: cassandra:5
    ports:
      - "9042:9042"
    volumes:
      - cassandra-data:/var/lib/cassandra
    environment:
      - CASSANDRA_CLUSTER_NAME=chat-dev
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "DESCRIBE KEYSPACES"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  cassandra-init:
    image: cassandra:5
    depends_on:
      cassandra:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -e
        cqlsh cassandra <<'CQL'
        CREATE KEYSPACE IF NOT EXISTS chat WITH replication = {'class': 'SimpleStrategy', 'replication_factor': 1};
        CREATE TYPE IF NOT EXISTS chat."Participant" (id TEXT, eng_name TEXT, company_name TEXT, app_id TEXT, app_name TEXT, is_bot BOOLEAN, account TEXT);
        CREATE TYPE IF NOT EXISTS chat."File" (id TEXT, name TEXT, type TEXT);
        CREATE TYPE IF NOT EXISTS chat."Card" (template TEXT, data BLOB);
        CREATE TYPE IF NOT EXISTS chat."CardAction" (verb TEXT, text TEXT, card_id TEXT, display_text TEXT, hide_exec_log BOOLEAN, card_tmid TEXT, data BLOB);
        CREATE TABLE IF NOT EXISTS chat.messages_by_room (
          room_id TEXT,
          created_at TIMESTAMP,
          message_id TEXT,
          sender FROZEN<"Participant">,
          target_user FROZEN<"Participant">,
          msg TEXT,
          mentions SET<FROZEN<"Participant">>,
          attachments LIST<BLOB>,
          file FROZEN<"File">,
          card FROZEN<"Card">,
          card_action FROZEN<"CardAction">,
          tshow BOOLEAN,
          thread_parent_created_at TIMESTAMP,
          visible_to TEXT,
          unread BOOLEAN,
          reactions MAP<TEXT, FROZEN<SET<FROZEN<"Participant">>>>,
          deleted BOOLEAN,
          type TEXT,
          sys_msg_data BLOB,
          site_id TEXT,
          edited_at TIMESTAMP,
          updated_at TIMESTAMP,
          PRIMARY KEY ((room_id), created_at, message_id)
        ) WITH CLUSTERING ORDER BY (created_at DESC, message_id DESC);
        CQL
        echo "Schema initialized successfully"

  history:
    build:
      context: ../..
      dockerfile: history-service/deploy/Dockerfile
    depends_on:
      nats:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
    environment:
      NATS_URL: nats://nats:4222
      SITE_ID: site-local
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB: chat
      CASSANDRA_HOSTS: cassandra
      CASSANDRA_KEYSPACE: chat
    ports:
      - "8080:8080"

volumes:
  mongo-data:
  cassandra-data:
