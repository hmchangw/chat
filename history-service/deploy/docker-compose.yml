name: history-service

services:
  valkey:
    image: valkey/valkey:8-alpine
    networks:
      - chat-local

  history-service:
    build:
      context: ../..
      dockerfile: history-service/deploy/Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
      - NATS_CREDS_FILE=/etc/nats/backend.creds
      - SITE_ID=site-local
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=chat
      - CASSANDRA_HOSTS=cassandra
      - CASSANDRA_KEYSPACE=chat
      - VALKEY_ADDR=valkey:6379
      - ATREST_ENABLED=true
      - ATREST_KEK_FILE=/etc/chat/keks.json
    volumes:
      - ../../docker-local/backend.creds:/etc/nats/backend.creds:ro
      - ../../message-worker/deploy/atrest-keks.json:/etc/chat/keks.json:ro
    networks:
      - chat-local

networks:
  chat-local:
    external: true
