name: history-service

services:
  mongodb:
    image: mongo:8
    ports:
      - "27017:27017"

  cassandra:
    image: cassandra:5
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=chat-dev

  history-service:
    build:
      context: ../..
      dockerfile: history-service/deploy/Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
      - NATS_CREDS_FILE=/etc/nats/backend.creds
      - SITE_ID=site-local
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=chat
      - CASSANDRA_HOSTS=cassandra
      - CASSANDRA_KEYSPACE=chat
    volumes:
      - ../../docker-local/backend.creds:/etc/nats/backend.creds:ro
    depends_on:
      - mongodb
      - cassandra
    networks:
      - chat-local
      - default

networks:
  chat-local:
    external: true
