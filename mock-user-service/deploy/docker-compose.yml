name: ${SITE_ID:-site-a}-mock-user-service

services:
  mock-user-service:
    build:
      context: ../..
      dockerfile: mock-user-service/deploy/Dockerfile
    container_name: ${SITE_ID:-site-a}-mock-user-service
    environment:
      - SITE_ID=${SITE_ID:-site-a}
      - NATS_URL=nats://${NATS_HOST:-nats-a}:4222
      - NATS_CREDS_FILE=/etc/nats/backend.creds
    volumes:
      - ../../docker-local/${SITE_ID:-site-a}/backend.creds:/etc/nats/backend.creds:ro
    networks:
      - chat-local

networks:
  chat-local:
    external: true
