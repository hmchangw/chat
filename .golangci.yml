version: "2"

linters:
  default: standard
  enable:
    - misspell
    - unconvert
    - gocritic
    - nilerr
    - bodyclose
    - exhaustive
  settings:
    goimports:
      local-prefixes:
        - github.com/hmchangw/chat
    exhaustive:
      default-signifies-exhaustive: true
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
  exclusions:
    presets:
      - std-error-handling
      - common-false-positives
    paths:
      - testdata
      - "mock_store_test\\.go$"
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/hmchangw/chat
