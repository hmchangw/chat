version: "2"

linters:
  default: standard
  enable:
    - misspell
    - unconvert
    - gocritic
    - nilerr
    - bodyclose
    - exhaustive
    - gosec
  settings:
    exhaustive:
      default-signifies-exhaustive: true
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
    gosec:
      # Narrowly scoped to G402 (TLS InsecureSkipVerify) so the existing
      # //nolint:gosec annotations in pkg/oidc and pkg/searchengine are
      # actually suppressing a real rule, and any new unannotated
      # InsecureSkipVerify is rejected at lint time.
      includes:
        - G402
  exclusions:
    presets:
      - std-error-handling
      - common-false-positives
    paths:
      - testdata
      - "mock_store_test\\.go$"
    rules:
      - path: _test\.go
        linters:
          - errcheck

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/hmchangw/chat
