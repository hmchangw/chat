trigger:
  branches:
    include:
      - main
      - develop
  paths:
    include:
      - data-migration/oplog-connector/
      - pkg/

pr:
  branches:
    include:
      - main
  paths:
    include:
      - data-migration/oplog-connector/
      - pkg/

variables:
  GO_VERSION: '1.25.11'
  SERVICE_PATH: data-migration/oplog-connector
  IMAGE_NAME: oplog-connector
  REGISTRY: '$(containerRegistry)'

stages:
  - stage: Validate
    displayName: 'Lint & Test'
    jobs:
      - job: LintAndTest
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: GoTool@0
            inputs:
              version: '$(GO_VERSION)'
            displayName: 'Install Go $(GO_VERSION)'

          - script: go vet ./$(SERVICE_PATH)/... ./pkg/...
            displayName: 'Go Vet'

          - script: go test ./pkg/... -v -race -coverprofile=coverage-pkg.out
            displayName: 'Test shared packages'

          - script: go test ./$(SERVICE_PATH)/... -v -race -coverprofile=coverage-$(IMAGE_NAME).out
            displayName: 'Test $(IMAGE_NAME)'

          - script: go build -o /dev/null ./$(SERVICE_PATH)/
            displayName: 'Build $(IMAGE_NAME)'

  - stage: Build
    displayName: 'Build & Push Image'
    dependsOn: Validate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: BuildImage
        pool:
          vmImage: 'ubuntu-latest'
        steps:
          - task: Docker@2
            inputs:
              containerRegistry: '$(containerRegistry)'
              repository: 'chat/$(IMAGE_NAME)'
              command: 'buildAndPush'
              Dockerfile: '$(SERVICE_PATH)/deploy/Dockerfile'
              buildContext: '.'
              tags: |
                $(Build.BuildId)
                latest
            displayName: 'Build & push $(IMAGE_NAME)'
