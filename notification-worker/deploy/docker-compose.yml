name: ${SITE_ID:-site-a}-notification-worker

services:
  notification-worker:
    build:
      context: ../..
      dockerfile: notification-worker/deploy/Dockerfile
    container_name: ${SITE_ID:-site-a}-notification-worker
    environment:
      - SITE_ID=${SITE_ID:-site-a}
      - NATS_URL=nats://${NATS_HOST:-nats-a}:4222
      - NATS_CREDS_FILE=/etc/nats/backend.creds
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=chat_${SITE_ID:-site-a}
      - BOOTSTRAP_STREAMS=true
    volumes:
      - ../../docker-local/${SITE_ID:-site-a}/backend.creds:/etc/nats/backend.creds:ro
    networks:
      - chat-local

networks:
  chat-local:
    external: true
