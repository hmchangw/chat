name: auth-service

services:
  auth-service:
    build:
      context: ../..
      dockerfile: auth-service/deploy/Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - path: ../../docker-local/.env
        required: false
    environment:
      - PORT=8080
      - NATS_JWT_EXPIRY=2h
      - OIDC_ISSUER_URL=http://keycloak:8080/realms/chatapp
      - OIDC_AUDIENCE=nats-chat
      - TLS_SKIP_VERIFY=false
    networks:
      - chat-local

networks:
  chat-local:
    external: true
