services:
  nats:
    image: nats:2.11-alpine
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["--jetstream", "--http_port", "8222"]

  auth-service:
    build:
      context: ../..
      dockerfile: auth-service/deploy/Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
      - NATS_CREDS=/run/secrets/nats.creds
      - AUTH_SIGNING_KEY=${AUTH_SIGNING_KEY}
    depends_on:
      - nats
