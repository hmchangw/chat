name: ${SITE_ID:-site-a}-auth-service

services:
  auth-service:
    build:
      context: ../..
      dockerfile: auth-service/deploy/Dockerfile
    container_name: ${SITE_ID:-site-a}-auth-service
    ports:
      - "${AUTH_HOST_PORT:-8080}:8080"
    env_file:
      - path: ../../docker-local/${SITE_ID:-site-a}.env
        required: false
    environment:
      - PORT=8080
      - NATS_URL=nats://${NATS_HOST:-nats-a}:4222
      - NATS_CREDS_FILE=/etc/nats/backend.creds
      # Bypass OIDC; accept any account name. Flip to false to test OIDC.
      - DEV_MODE=${DEV_MODE:-true}
      - NATS_JWT_EXPIRY=2h
      - OIDC_ISSUER_URL=http://keycloak:8080/realms/chatapp
      - OIDC_AUDIENCES=nats-chat
      - TLS_SKIP_VERIFY=false
    volumes:
      - ../../docker-local/${SITE_ID:-site-a}/backend.creds:/etc/nats/backend.creds:ro
    networks:
      - chat-local

networks:
  chat-local:
    external: true
