services:
  multi-db-crud:
    build:
      context: ../..
      dockerfile: tools/multi-db-crud/deploy/Dockerfile
    ports:
      - "8091:8091"
    environment:
      PORT: "8091"
    depends_on:
      mongo:
        condition: service_healthy
      cassandra:
        condition: service_healthy

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  cassandra:
    image: cassandra:4.1
    ports:
      - "9042:9042"
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe keyspaces"]
      interval: 15s
      timeout: 10s
      retries: 10
