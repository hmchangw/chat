global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - "rules/loadgen.yml"

scrape_configs:
  - job_name: loadgen
    static_configs:
      - targets: ["loadgen:9099"]
  # NATS monitoring on :8222 serves JSON (/varz, /jsz) — not Prometheus.
  # Add prometheus-nats-exporter as a sidecar if NATS metrics are needed.
