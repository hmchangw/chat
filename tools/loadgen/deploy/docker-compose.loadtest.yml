name: loadgen

services:
  nats:
    image: nats:2.11-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      # /healthz is the standard NATS HTTP healthcheck on the monitor
      # port. Lets dependents use `condition: service_healthy` instead
      # of the racy `service_started`.
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz | grep -q '\"status\":\"ok\"' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks: [loadtest]

  mongodb:
    image: mongo:8
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --eval 'db.runCommand({ping:1}).ok' | grep -q '^1$$' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks: [loadtest]

  cassandra:
    image: cassandra:4.1
    environment:
      - CASSANDRA_CLUSTER_NAME=loadtest
    ports:
      - "9042:9042"
    networks: [loadtest]
    # Cassandra 4.1 can race the first `UN` flip — the keyspace init
    # depends on service_healthy so a too-tight retry budget leaves
    # cassandra-init exiting with code 1, requiring a manual re-run.
    # 60 × 10s = 10min covers cold-start on slower hosts.
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -q '^UN'"]
      interval: 10s
      timeout: 5s
      retries: 60

  cassandra-init:
    image: cassandra:4.1
    depends_on:
      cassandra:
        condition: service_healthy
    entrypoint:
      - sh
      - -c
      - |
        cqlsh cassandra -e "CREATE KEYSPACE IF NOT EXISTS chat WITH replication = {'class':'SimpleStrategy','replication_factor':1};"
    networks: [loadtest]
    restart: "no"

  message-gatekeeper:
    build:
      context: ../../..
      dockerfile: message-gatekeeper/deploy/Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
      - SITE_ID=site-local
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=loadgen
      # Owns MESSAGES + MESSAGES_CANONICAL streams; must bootstrap in
      # the loadgen compose stack since no external IaC creates them.
      - BOOTSTRAP_STREAMS=true
    depends_on: [nats, mongodb]
    networks: [loadtest]

  message-worker:
    build:
      context: ../../..
      dockerfile: message-worker/deploy/Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
      - SITE_ID=site-local
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=loadgen
      - CASSANDRA_HOSTS=cassandra
      - CASSANDRA_KEYSPACE=chat
      - BOOTSTRAP_STREAMS=true
    depends_on:
      nats:
        condition: service_started
      mongodb:
        condition: service_started
      cassandra-init:
        condition: service_completed_successfully
    networks: [loadtest]

  broadcast-worker:
    build:
      context: ../../..
      dockerfile: broadcast-worker/deploy/Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
      - SITE_ID=site-local
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=loadgen
      - BOOTSTRAP_STREAMS=true
    depends_on: [nats, mongodb]
    networks: [loadtest]

  notification-worker:
    build:
      context: ../../..
      dockerfile: notification-worker/deploy/Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
      - SITE_ID=site-local
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=loadgen
      - BOOTSTRAP_STREAMS=true
    depends_on: [nats, mongodb]
    networks: [loadtest]

  # inbox-worker owns the INBOX_site-local stream per CLAUDE.md §6 (Stream
  # bootstrap ownership). Without it, search-sync-worker error-loops trying
  # to attach a consumer to a non-existent INBOX stream. Even when no
  # cross-site federation is configured, inbox-worker is needed to create
  # the stream so downstream consumers can subscribe.
  inbox-worker:
    build:
      context: ../../..
      dockerfile: inbox-worker/deploy/Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
      - SITE_ID=site-local
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=loadgen
      - BOOTSTRAP_STREAMS=true
    depends_on: [nats, mongodb]
    networks: [loadtest]

  room-service:
    build:
      context: ../../..
      dockerfile: room-service/deploy/Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
      - SITE_ID=site-local
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=loadgen
      - BOOTSTRAP_STREAMS=true
      # VALKEY_ADDR + VALKEY_KEY_GRACE_PERIOD are env:",required" in
      # room-service/main.go (used to dedupe room-key writes).
      - VALKEY_ADDR=valkey:6379
      - VALKEY_KEY_GRACE_PERIOD=24h
    depends_on: [nats, mongodb, valkey]
    networks: [loadtest]

  room-worker:
    build:
      context: ../../..
      dockerfile: room-worker/deploy/Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
      - SITE_ID=site-local
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=loadgen
      - BOOTSTRAP_STREAMS=true
    depends_on: [nats, mongodb, room-service]
    networks: [loadtest]

  elasticsearch:
    image: elasticsearch:8.15.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks: [loadtest]

  valkey:
    image: valkey/valkey:8
    ports:
      - "6379:6379"
    networks: [loadtest]

  history-service:
    build:
      context: ../../..
      dockerfile: history-service/deploy/Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
      - SITE_ID=site-local
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=loadgen
      - CASSANDRA_HOSTS=cassandra
      - CASSANDRA_KEYSPACE=chat
      - VALKEY_ADDR=valkey:6379
      - ENCRYPTION_ENABLED=false
    depends_on:
      nats:
        condition: service_started
      mongodb:
        condition: service_started
      cassandra-init:
        condition: service_completed_successfully
      valkey:
        condition: service_started
    networks: [loadtest]

  search-service:
    build:
      context: ../../..
      dockerfile: search-service/deploy/Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
      - SITE_ID=site-local
      - SEARCH_URL=http://elasticsearch:9200
      - SEARCH_BACKEND=elasticsearch
      - VALKEY_ADDR=valkey:6379
      - VALKEY_PASSWORD=
      - SEARCH_DOC_COUNTS=25
      - SEARCH_MAX_DOC_COUNTS=100
      - SEARCH_RESTRICTED_ROOMS_CACHE_TTL=5m
      - SEARCH_RECENT_WINDOW=8760h
      - SEARCH_REQUEST_TIMEOUT=10s
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=loadgen
    depends_on:
      nats:
        condition: service_started
      mongodb:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      valkey:
        condition: service_started
    networks: [loadtest]

  search-sync-worker:
    build:
      context: ../../..
      dockerfile: search-sync-worker/deploy/Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
      - SITE_ID=site-local
      - SEARCH_URL=http://elasticsearch:9200
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=loadgen
      # MSG_INDEX_PREFIX is env:",required". Mirrors the canonical
      # value from search-sync-worker/deploy/docker-compose.yml.
      - MSG_INDEX_PREFIX=messages-site-local-v1
    depends_on:
      nats:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      mongodb:
        condition: service_started
    networks: [loadtest]

  loadgen:
    build:
      context: ../../..
      dockerfile: tools/loadgen/deploy/Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
      - SITE_ID=site-local
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=loadgen
      - METRICS_ADDR=:9099
      # Worker-pool cap for concurrent publishes. Set to 0 to publish
      # serially on the ticker goroutine (legacy behavior).
      - MAX_IN_FLIGHT=200
      # Enable pprof on a separate port by uncommenting and mapping
      # the port. Off by default so the metrics endpoint doesn't expose
      # profiling.
      # - PPROF_ADDR=:6060
    ports:
      - "9099:9099"
    depends_on:
      - nats
      - mongodb
      - message-gatekeeper
      - message-worker
      - broadcast-worker
      - notification-worker
      - history-service
      - search-service
      - search-sync-worker
      - room-service
      - room-worker
    entrypoint: ["sleep", "infinity"]
    networks: [loadtest]

  # Phase 1b §1.12 dashboards-profile exporters — only started when
  # --profile dashboards is passed (e.g. `make run-dashboards`).
  # The default compose footprint is unaffected.

  prometheus-nats-exporter:
    image: natsio/prometheus-nats-exporter:0.16.0
    profiles: [dashboards]
    command:
      - "-varz"
      - "-jsz=all"
      - "-channelz"
      - "-port=7777"
      - "http://nats:8222"
    networks: [loadtest]
    depends_on:
      nats:
        condition: service_healthy

  cassandra-exporter:
    image: criteord/cassandra_exporter:2.3.6
    profiles: [dashboards]
    environment:
      - CASSANDRA_EXPORTER_CONFIG_host=cassandra:7199
    networks: [loadtest]
    depends_on:
      cassandra:
        condition: service_healthy

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    profiles: [dashboards]
    # cAdvisor requires privileged mode to read host-level metrics from /sys,
    # /var/run, and the Docker daemon. This is the only privileged container in
    # the loadgen compose stack and is used for system monitoring only.
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks: [loadtest]

  prometheus:
    image: prom/prometheus:v2.55.0
    profiles: [dashboards]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks: [loadtest]

  grafana:
    image: grafana/grafana:11.2.2
    profiles: [dashboards]
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks: [loadtest]

networks:
  loadtest:
