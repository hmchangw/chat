scenario: verified_user_creates_channel_room
source: room-service/handler.go:296-374 + pkg/model/event.go:245-253

input:
  verb: nats_request
  subject: chat.user.${requester.account}.request.room.${site}.create
  payload:
    name: $auto
    users: ["${other.account}"]
  credential: ${requester.credential}
  placeholders:
    requester:
      type: user
      predicate:
        verified: true
    other:
      type: user
      predicate:
        verified: true

sequence:
  - service: room-service
    reads:
      - location: reply
        matcher: matches_shape
        expected:
          body_json:
            status: accepted
            roomType: channel
      - location: jetstream.rooms-canonical
        matcher: matches_shape
        expected:
          body_json:
            name: ${input.payload.name}
            requesterAccount: ${requester.account}
            requesterId: ${requester.id}
