scenario: message-worker-at-all-mention-persisted
source: >
  pkg/mention/mention.go ResolveFromParsed (an @all mention appends a synthetic
  Participant{Account: "all", EngName: "all"} with NO UserID/SiteID),
  message-worker/handler.go:63-67 (worker runs mention.Resolve and sets evt.Message.Mentions),
  message-worker/store_cassandra.go:41-55 (toMentionSet → cassParticipant{ID: m.UserID,
  Account: m.Account, ...}), store_cassandra.go:86-105 (SaveMessage persists the mentions set)
status: draft
tag: positive

# CONTRACT / EDGE: an @all mention materializes as a synthetic participant
# in the persisted mentions set with account="all" and an EMPTY user id
# (it is a pseudo-user, not a real account). This documents how @all lands
# on the Cassandra row — distinct from a real @account mention which
# carries a resolved user id.
#
# Surfaces:
#   1  canonical event published
#   2  messages_by_id mentions set contains the @all participant (account=all)

sites:
  site-a:
    seed:
      users:
        alice: { verified: true }
      rooms:
        - id: r-general
          name: General
          type: channel
      memberships:
        alice:
          - room: r-general
            roles: [member]

input:
  site: site-a
  verb: jetstream_publish
  subject: chat.user.${alice.account}.room.r-general.site-a.msg.send
  payload:
    id: m4atallmention000001
    content: "@all please read this announcement"
    requestId: 01970a4f-8c2d-7c9a-abcd-e01234567905
  credential: ${alice.credential}

expected:
  - location: jetstream_consume
    site: site-a
    args:
      stream: MESSAGES_CANONICAL_site-a
      filter_subject: chat.msg.canonical.site-a.created
    match:
      body_json:
        event: created
        message:
          id: m4atallmention000001

  # The worker resolved @all and persisted the synthetic participant. ROSM
  # list match: the mentions set must contain an element with account=all.
  - location: cassandra_select
    args:
      query: "SELECT JSON * FROM messages_by_id WHERE message_id = ?"
      params: [m4atallmention000001]
    match:
      message_id: m4atallmention000001
      mentions:
        - account: all
    timeout: 10s
