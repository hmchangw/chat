scenario: gatekeeper-quote-cross-context-mismatch-rejected
source: >
  message-gatekeeper/handler.go:308-340 (resolveQuoteSnapshot enforces the strict
  same-conversation-context rule: snap.ThreadParentID must equal the new message's thread id,
  else errcode.BadRequest "thread context mismatch"), message-gatekeeper/fetcher_history.go:71-81
  (FetchQuotedParent projects history's cassandra.Message.ThreadParentID into the snapshot),
  history-service/internal/service/messages.go GetMessageByID + utils.go:44-58 findMessage
  (returns the seeded message; access-window skipped when historySharedSince is unset),
  history-service/internal/mongorepo/subscription.go GetHistorySharedSince (nil for a seeded
  membership → getAccessSince returns nil → no window check)
status: draft
tag: negative

# CONTRACT: a main-room message may only quote a main-room parent; a
# thread-T message may only quote other thread-T messages. The gatekeeper
# rejects cross-context quotes. Here a MAIN-room send (no
# threadParentMessageId → new message thread id = "") quotes a parent that
# IS a thread message (its thread_parent_id is non-empty). The mismatch
# (snap.ThreadParentID="m0threadparent000001" != "") must be rejected
# BadRequest, and no canonical event published.
#
# The quoted parent is seeded directly into Cassandra messages_by_id as a
# thread message. alice is a member of r-general, so the gatekeeper's
# internal history fetch (chat.user.{account}.request.room.{room}.{site}.msg.get,
# issued by the gatekeeper with backend creds — not the test's concern)
# resolves it. A seeded membership has no historySharedSince, so history's
# access-window check is skipped and the parent is retrievable regardless
# of its created_at.
#
# Surfaces: reply bad_request; gatekeeper logged the rejection; no canonical.

sites:
  site-a:
    seed:
      users:
        alice: { verified: true }
      rooms:
        - id: r-general
          name: General
          type: channel
      memberships:
        alice:
          - room: r-general
            roles: [member]

cassandra_data:
  - table: messages_by_id
    rows:
      # A pre-existing THREAD message (thread_parent_id set) living in
      # r-general. Quoting it from a main-room message is the cross-context
      # violation under test.
      - message_id: m9quotedthreadmsg001
        created_at: ${now - 1h}
        room_id: r-general
        site_id: site-a
        msg: "i live inside a thread; quoting me from the main room is a context mismatch"
        thread_parent_id: m0threadparent000001

input:
  site: site-a
  verb: jetstream_publish
  subject: chat.user.${alice.account}.room.r-general.site-a.msg.send
  payload:
    id: m8quotecrosscontext1
    content: main-room message quoting a thread message
    requestId: 01970a4f-8c2d-7c9a-abcd-e01234567901
    quotedParentMessageId: m9quotedthreadmsg001
    # NOTE: no threadParentMessageId — this is a main-room send, so the new
    # message's thread context is "" and the quoted parent's thread context
    # (m0threadparent000001) does not match.
  credential: ${alice.credential}

expected:
  - location: nats_subscribe
    site: site-a
    args:
      subject: chat.user.${alice.account}.response.01970a4f-8c2d-7c9a-abcd-e01234567901
    match:
      received:
        - body_json:
            code: bad_request

  - location: logs_tail
    site: site-a
    args:
      container: message-gatekeeper
    match:
      msg: request failed
      code: bad_request

  - location: jetstream_consume
    site: site-a
    args:
      stream: MESSAGES_CANONICAL_site-a
      filter_subject: chat.msg.canonical.site-a.created
    not: true
    match:
      body_json:
        message:
          id: m8quotecrosscontext1
