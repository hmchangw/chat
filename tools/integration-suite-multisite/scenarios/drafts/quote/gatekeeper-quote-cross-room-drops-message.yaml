scenario: gatekeeper-quote-cross-room-drops-message
source: >
  message-gatekeeper/handler.go:257-340 (resolveQuoteSnapshot fetches the quoted parent via
  history MsgGet scoped to the SENDER's room; a NotFound propagates and drops the whole message
  — F-006), history-service/internal/service/utils.go findMessage (returns NotFound when
  msg.RoomID != the requested roomID — the per-room access boundary)
status: draft
tag: positive

# F-006 FACET (cross-room quote): quoting a message that lives in a
# DIFFERENT room drops the whole message. The quoted parent (m-other) is
# seeded in r-other; alice (a member of r-general only) sends in r-general
# quoting it. The gatekeeper's history fetch is scoped to r-general, so
# findMessage sees m-other.RoomID=r-other != r-general → NotFound → the
# quoting message is dropped (F-006). The room scoping is a reasonable
# access boundary (you shouldn't quote messages from rooms you're not in),
# but it manifests as the F-006 whole-message-drop rather than a clean
# "can't quote across rooms" rejection.
#
# Deterministic (the room mismatch is fixed); no timing race.

sites:
  site-a:
    seed:
      users:
        alice: { verified: true }
      rooms:
        - id: r-general
          name: General
          type: channel
      memberships:
        alice:
          - room: r-general
            roles: [member]

cassandra_data:
  - table: messages_by_id
    rows:
      # A real message, but in a DIFFERENT room (r-other) than alice sends in.
      - message_id: m0otherroomsg0000001
        created_at: ${now - 1h}
        room_id: r-other
        site_id: site-a
        msg: "a message in another room"

input:
  site: site-a
  verb: jetstream_publish
  subject: chat.user.${alice.account}.room.r-general.site-a.msg.send
  payload:
    id: m0crossroomquote0001
    content: trying to quote a message from another room
    requestId: 01970a4f-8c2d-7c9a-abcd-e01234567915
    quotedParentMessageId: m0otherroomsg0000001
  credential: ${alice.credential}

# OPEN FINDING F-006 (cross-room facet) — EXPECTED TO FAIL until quote
# resolution soft-fails per the ParentMessageFetcher contract instead of
# dropping the whole message. +ve scenario asserting the CORRECT behavior;
# the failure IS the bug (draft + fail = open finding). Per AUTHORING.md
# §Pass/fail semantics.
expected:
  # CORRECT — per the ParentMessageFetcher contract ("the handler soft-fails on
  # every error and ships the message without the quote"), a cross-room quote
  # must NOT drop the whole message. EXPECTED: the message's canonical is
  # published. FAILS today because the resolver hard-fails the NotFound and
  # drops the message.
  - location: jetstream_consume
    site: site-a
    args:
      stream: MESSAGES_CANONICAL_site-a
      filter_subject: chat.msg.canonical.site-a.created
    match:
      body_json:
        message:
          id: m0crossroomquote0001
