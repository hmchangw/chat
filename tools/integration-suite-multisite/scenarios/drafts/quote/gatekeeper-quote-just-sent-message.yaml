scenario: gatekeeper-quote-just-sent-message
source: >
  message-gatekeeper/handler.go:257-340 (resolveQuoteSnapshot synchronously fetches the quoted
  parent from history-service; a NotFound propagates and drops the whole message — F-006),
  message-worker persists the canonical message to Cassandra ASYNC (behind the gatekeeper
  publish), so a just-sent message is not yet readable by history GetMessageByID; multi-input
  per 2026-06-13-integration-suite-multi-input.md
status: draft
tag: positive

# READ-YOUR-WRITE CONTRACT (F-006 fresh-quote facet) — currently PASSES.
# task1 sends M; task2 immediately quotes M by its client-set id. The
# gatekeeper resolves the quote via a synchronous history fetch while
# message-worker persists M asynchronously — a latent race. +ve: the
# quoting message should ship.
#
# In earlier sessions this dropped (fetch beat the persist). As of runs
# 3e7d/cfb4/ddd9/1092/c20b it PASSES 5/5 — the persist reliably wins in
# this environment, so the fresh-quote race no longer reproduces. The code
# window still exists (latent), so this scenario is kept GREEN as a
# regression guard: if the race re-appears (heavier load / slower persist)
# it flips red and catches it. See F-006 in the findings doc.

sites:
  site-a:
    seed:
      users:
        alice: { verified: true }
      rooms:
        - id: r-general
          name: General
          type: channel
      memberships:
        alice:
          - room: r-general
            roles: [member]

input:
  - id: send_original
    site: site-a
    verb: jetstream_publish
    subject: chat.user.${alice.account}.room.r-general.site-a.msg.send
    payload:
      id: m0origmsg00000000001
      content: the original message
      requestId: 01970a4f-8c2d-7c9a-abcd-e01234567912
    credential: ${alice.credential}

  - id: send_quote
    site: site-a
    verb: jetstream_publish
    subject: chat.user.${alice.account}.room.r-general.site-a.msg.send
    payload:
      id: m1quotingmsg00000001
      content: quoting the message I just sent
      requestId: 01970a4f-8c2d-7c9a-abcd-e01234567913
      quotedParentMessageId: m0origmsg00000000001
    credential: ${alice.credential}

# OPEN FINDING F-006 (fresh-quote facet) — EXPECTED TO FAIL until quoting a
# just-sent message works (read-your-write). +ve scenario asserting the
# correct behavior; the failure IS the bug (draft + fail = open finding). Per
# AUTHORING.md §Pass/fail semantics.
expected:
  # Control (+ve, passes) — the ORIGINAL send went through (its canonical is
  # published), so the failure below is the fresh-quote race, not a broken send.
  - location: jetstream_consume
    site: site-a
    args:
      stream: MESSAGES_CANONICAL_site-a
      filter_subject: chat.msg.canonical.site-a.created
    match:
      body_json:
        message:
          id: m0origmsg00000000001

  # CORRECT — quoting a message you JUST sent should succeed: the quoting
  # message's canonical is published. FAILS today because the gatekeeper's
  # synchronous quote-fetch races the worker's async persist of M and returns
  # not_found, dropping the whole quoting message.
  - location: jetstream_consume
    site: site-a
    args:
      stream: MESSAGES_CANONICAL_site-a
      filter_subject: chat.msg.canonical.site-a.created
    match:
      body_json:
        message:
          id: m1quotingmsg00000001
