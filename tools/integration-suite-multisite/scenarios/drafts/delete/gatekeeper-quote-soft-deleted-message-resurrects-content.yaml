scenario: gatekeeper-quote-soft-deleted-message-resurrects-content
source: >
  history-service/internal/cassrepo/write.go:38 (deleteMsgByIDCAS soft-deletes
  with `SET deleted = true, enc_payload = null, enc_meta = null` — it nulls the
  ENCRYPTED columns but NOT the plaintext `msg` column),
  history-service/internal/service/messages.go:258-279 (GetMessageByID has NO
  Deleted filter — findMessage/utils.go:76-91 returns the row regardless of
  deleted, and the handler only redacts the message's OWN quoted-parent for the
  access window, never the message itself), message-gatekeeper/fetcher_history.go:71-81
  (FetchQuotedParent projects parent.Msg into the snapshot with no Deleted check),
  message-gatekeeper/handler.go resolveQuoteSnapshot (embeds the snapshot, no
  Deleted check). Suite stack runs unencrypted (no roomcrypto/cipher container),
  so the plaintext `msg` path is the live path.
status: draft
tag: negative

# OPEN FINDING F-015 (privacy) — EXPECTED TO FAIL until the chat-app team
# fixes soft-delete content recovery. Per AUTHORING.md §Pass/fail semantics,
# this is a -ve scenario asserting the CORRECT behavior; its failure IS the
# bug (draft + fail = open finding, not a regression).
#
# CORRECT behavior asserted: a soft-deleted message's content must NOT be
# recoverable — neither retained in the plaintext `msg` column after delete,
# nor embedded into a quoting message. The bug: soft-delete nulls only the
# encrypted columns (enc_payload/enc_meta) leaving `msg` intact;
# GetMessageByID never filters deleted rows; the gatekeeper quote-resolver
# projects parent.Msg with no Deleted check. So both -ve guards below fail:
#   1. msg column should be cleared on delete — it isn't (defect 1).
#   2. a quote of a deleted message should NOT carry the live content — it
#      does (defect 2).
#
# alice sends+owns M, deletes it (sender-only, succeeds); bob (a different
# member) then quotes M. Multi-input: delete (nats_request, synchronous)
# completes before the quote fires — deterministic. Unique room r-deltest to
# avoid F-009 cache bleed.

sites:
  site-a:
    seed:
      users:
        alice: { verified: true }
        bob: { verified: true }
      rooms:
        - id: r-deltest
          name: Delete Test
          type: channel
      memberships:
        alice:
          - room: r-deltest
            roles: [member]
        bob:
          - room: r-deltest
            roles: [member]

cassandra_data:
  - table: messages_by_id
    rows:
      # alice's message, seeded recent so it's inside bob's access window.
      - message_id: m0deletedmsg00000001
        created_at: ${now - 1h}
        room_id: r-deltest
        site_id: site-a
        msg: "secret content alice will delete"
        sender:
          id: u-alice
          account: alice
          eng_name: alice
          company_name: alice

input:
  # task1 — alice (the sender) soft-deletes M. Synchronous RPC; completes
  # before the quote fires.
  - id: delete
    site: site-a
    verb: nats_request
    subject: chat.user.${alice.account}.request.room.r-deltest.site-a.msg.delete
    payload:
      messageId: m0deletedmsg00000001
    credential: ${alice.credential}

  # task2 — bob quotes the now-deleted M.
  - id: quote_deleted
    site: site-a
    verb: jetstream_publish
    subject: chat.user.${bob.account}.room.r-deltest.site-a.msg.send
    payload:
      id: m1quotedeleted000001
      content: quoting alice's deleted message
      requestId: 01970a4f-8c2d-7c9a-abcd-e01234567922
      quotedParentMessageId: m0deletedmsg00000001
    credential: ${bob.credential}

expected:
  # The delete succeeded (sender-only authorization passed).
  - location: reply
    match:
      task: delete
      body_json:
        messageId: m0deletedmsg00000001

  # CORRECT (defect 1) — after soft-delete the plaintext `msg` column must
  # NOT still hold the original content. EXPECTED: this row is absent.
  # FAILS today because soft-delete leaves `msg` intact (only enc_* nulled).
  - location: cassandra_select
    args:
      query: "SELECT JSON * FROM messages_by_id WHERE message_id = ?"
      params: [m0deletedmsg00000001]
    not: true
    match:
      message_id: m0deletedmsg00000001
      msg: "secret content alice will delete"
    timeout: 10s

  # CORRECT (defect 2) — a quote of a soft-deleted message must NOT carry
  # the live deleted content. EXPECTED: no canonical for bob's message
  # embeds the deleted text. FAILS today because the quote-resolver projects
  # parent.Msg with no Deleted check, resurrecting the content.
  - location: jetstream_consume
    site: site-a
    args:
      stream: MESSAGES_CANONICAL_site-a
      filter_subject: chat.msg.canonical.site-a.created
    not: true
    match:
      body_json:
        event: created
        message:
          id: m1quotedeleted000001
          quotedParentMessage:
            messageId: m0deletedmsg00000001
            msg: "secret content alice will delete"
