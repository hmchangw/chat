scenario: thread-mention-remote-nonmember-federates-subscription
source: >
  message-worker/handler.go:63-67 (mention.Resolve — global user lookup, no membership
  scoping), handler.go:366-392 (markThreadMentions auto-creates a thread_subscription for
  every mentionee AND calls publishThreadSubOutboxIfRemote with the mentionee's home site),
  handler.go:394-435 (publishThreadSubOutboxIfRemote → outbox.{local}.to.{ownerSite}.thread_subscription_upserted
  when the mentionee's site differs from local), inbox-worker/handler.go:96-97,274-279
  (handleThreadSubscriptionUpserted → UpsertThreadSubscription applies it on the dest site).
  Federation tail mechanics per cross-site-room-rename-federation.yaml.
status: draft
tag: negative

# F-016 CROSS-SITE ESCALATION (federation): F-016 showed that @-mentioning a
# non-member in a thread reply auto-subscribes them locally. This proves the
# escalation crosses sites: mentioning a REMOTE non-member federates a
# thread_subscription all the way to that user's HOME site, where inbox-worker
# applies it — so a user who is a member of NOTHING on the acting site, and
# not a member of the room on their own site, ends up with a durable thread
# subscription on their home site purely by being @-mentioned from another site.
#
# The parent message is authored by alice (LOCAL) so the ONLY cross-site
# federation here comes from the MENTION (not the remote-parent path that
# thread-first-reply-remote-parent-federates-subscription already covers).
# remotebob is projected into site-a via remote_users (home_site site-b) so
# mention.Resolve classifies him as remote; he is seeded on site-b as a real
# user but is NOT a member of any room.
#
# Surfaces (localising the federation chain end-to-end):
#   1  canonical reply published on site-a
#   2  remotebob thread_subscription inserted LOCALLY on site-a (F-016, local)
#   3  OUTBOX_site-a → thread_subscription_upserted, destSiteId site-b (worker output)
#   4  INBOX_site-b receives the aggregate event (federation Source)
#   5  remotebob thread_subscription APPLIED on site-b (inbox-worker) — the escalation
#
# Requires OUTBOX_site-a (ops-owned, F-001) — stood up via prep-outbox.sh.

sites:
  site-a:
    seed:
      users:
        alice: { verified: true }
      remote_users:
        remotebob:
          home_site: site-b
      rooms:
        - id: r-fedment
          name: Fed Mention
          type: channel
      memberships:
        alice:
          - room: r-fedment
            roles: [member]
  site-b:
    seed:
      users:
        remotebob: { verified: true }   # real user on site-b, member of nothing

cassandra_data:
  - table: messages_by_id
    rows:
      - message_id: m0fedmentparent00001
        created_at: 1748736000000
        room_id: r-fedment
        site_id: site-a
        msg: "thread parent authored locally by alice"
        sender:
          id: u-alice
          account: alice
          eng_name: alice
          company_name: alice
  - table: messages_by_room
    rows:
      - room_id: r-fedment
        bucket: 1748736000000
        created_at: 1748736000000
        message_id: m0fedmentparent00001
        site_id: site-a
        msg: "thread parent authored locally by alice"
        sender:
          id: u-alice
          account: alice
          eng_name: alice
          company_name: alice

pre_fire_scripts:
  - ../prep-outbox.sh

input:
  site: site-a
  verb: jetstream_publish
  subject: chat.user.${alice.account}.room.r-fedment.site-a.msg.send
  payload:
    id: m1fedmentreply000001
    content: "@remotebob take a look at this thread"
    requestId: 01970a4f-8c2d-7c9a-abcd-e01234567929
    threadParentMessageId: m0fedmentparent00001
    threadParentMessageCreatedAt: 1748736000000
  credential: ${alice.credential}

# OPEN FINDING F-016 (cross-site escalation) — EXPECTED TO FAIL until mention
# resolution is scoped to room members. -ve scenario asserting the CORRECT
# behavior; the failure IS the bug (draft + fail = open finding). Per
# AUTHORING.md §Pass/fail semantics.
expected:
  # Setup (+ve, passes) — the thread reply itself is a valid send and publishes.
  - location: jetstream_consume
    site: site-a
    args:
      stream: MESSAGES_CANONICAL_site-a
      filter_subject: chat.msg.canonical.site-a.created
    match:
      body_json:
        event: created
        message:
          id: m1fedmentreply000001

  # CORRECT (reliable anchor) — a non-member (@remotebob) must NOT get a
  # thread_subscription, even locally. EXPECTED: absent. FAILS today (the
  # local grant happens in ms — this anchors the scenario as a reliable fail
  # regardless of federation timing).
  - location: mongo_find
    site: site-a
    args:
      collection: thread_subscriptions
      filter:
        parentMessageId: m0fedmentparent00001
        userAccount: remotebob
    not: true
    match:
      userAccount: remotebob
    timeout: 10s

  # CORRECT (the cross-site escalation) — the non-member's sub must NOT reach
  # remotebob's home site. EXPECTED: no thread_subscription for remotebob on
  # site-b. FAILS today: inbox-worker applies the federated thread_sub.
  # Generous window — the federated apply lands within ~seconds (runs 6c59,
  # 4c72) but a -ve on a laggy outcome needs margin so it reliably catches it.
  - location: mongo_find
    site: site-b
    args:
      collection: thread_subscriptions
      filter:
        parentMessageId: m0fedmentparent00001
        userAccount: remotebob
    not: true
    match:
      userAccount: remotebob
    timeout: 20s
