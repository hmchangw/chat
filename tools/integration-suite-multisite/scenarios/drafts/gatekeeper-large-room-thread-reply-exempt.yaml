scenario: gatekeeper-large-room-thread-reply-exempt
source: >
  message-gatekeeper/handler.go:230-231 (isThreadReply := req.ThreadParentMessageID != ""; the
  cap check runs only `if !isThreadReply && !canBypassLargeRoomCap` — so a thread reply is
  exempt regardless of room size and regardless of sender role)
status: draft
tag: positive

# CONTRACT: thread replies are exempt from the large-room cap, for ANY
# sender. alice is a plain member of r-busy-thread (userCount=501) — a top-level
# send would be blocked (gatekeeper-large-room-member-blocked) — but
# because this send carries a threadParentMessageId, isThreadReply is true
# and the cap check is skipped entirely, so the canonical event is
# published.
#
# The thread parent need not exist for the gatekeeper to exempt + publish
# (parent existence is never checked here — see F-004); the worker will
# orphan it downstream, which is out of scope for THIS gate test. We only
# assert the gatekeeper published the canonical event.

sites:
  site-a:
    seed:
      users:
        alice: { verified: true }
      rooms:
        - id: r-busy-thread
          name: BusyChannel
          type: channel
          user_count: 501
      memberships:
        alice:
          - room: r-busy-thread
            roles: [member]

input:
  site: site-a
  verb: jetstream_publish
  subject: chat.user.${alice.account}.room.r-busy-thread.site-a.msg.send
  payload:
    id: m8largeroomthread001
    content: a thread reply in a large room is exempt from the post cap
    requestId: 01970a4f-8c2d-7c9a-abcd-e0123456790a
    threadParentMessageId: m0largeroomtparent01
    threadParentMessageCreatedAt: ${now}
  credential: ${alice.credential}

expected:
  - location: jetstream_consume
    site: site-a
    args:
      stream: MESSAGES_CANONICAL_site-a
      filter_subject: chat.msg.canonical.site-a.created
    match:
      body_json:
        event: created
        message:
          id: m8largeroomthread001
          roomId: r-busy-thread
          threadParentMessageId: m0largeroomtparent01
