scenario: thread-first-reply-remote-parent-federates-subscription
source: >
  message-worker/handler.go:166-187 (handleFirstThreadReply: lookupOwnerSiteID(parentSender.ID)
  resolves the parent author's home site; when it differs from the local site,
  publishThreadSubOutboxIfRemote emits a cross-site thread_subscription_upserted),
  message-worker/handler.go:398-435 (publishThreadSubOutboxIfRemote: builds OutboxEvent,
  subject.Outbox(local, ownerSite, OutboxThreadSubscriptionUpserted)),
  message-worker/handler.go:318-330 (lookupOwnerSiteID → FindUserByID(...).SiteID),
  pkg/subject/subject.go:128 (Outbox = outbox.{site}.to.{dest}.{eventType}),
  pkg/model/event.go:126 (OutboxThreadSubscriptionUpserted = "thread_subscription_upserted"),
  pkg/model/event.go:158-162 (OutboxEvent envelope: type/siteId/destSiteId/payload[base64]/timestamp)
status: draft
tag: positive

# CONTRACT (the worker's ONE cross-site behavior): when a thread reply's
# parent was authored by a REMOTE user, the worker inserts the parent
# author's thread subscription locally AND publishes a
# thread_subscription_upserted OUTBOX event addressed to that author's
# home site, so the subscription federates.
#
# Setup: remotebob is a remote user — minted on site-b, projected into site-a's
# `users` collection with siteId=site-b via remote_users. The seeded
# parent message (in shared Cassandra) names remotebob as its sender, so when
# alice (site-a) fires the first reply, the worker on site-a resolves the
# parent author as remotebob, sees his home site is site-b (remote), and
# publishes outbox.site-a.to.site-b.thread_subscription_upserted.
#
# The OUTBOX publish is the worker's DIRECT output and the surface under
# test — it does not depend on federation Sources delivering to
# INBOX_site-b (that tail is exercised by cross-site-room-rename-federation
# and is the flaky part). Asserting OUTBOX_site-a isolates the worker's
# behavior. Envelope fields only — OutboxEvent.payload is base64.
#
# Requires OUTBOX_site-a to exist (ops-owned in prod; F-001) — stood up
# here via prep-outbox.sh.
#
# Surfaces:
#   1  canonical reply published on site-a (gatekeeper validated)
#   2  parent author (remotebob) thread subscription inserted LOCALLY on site-a
#   3  replier (alice) thread subscription inserted on site-a
#   4  OUTBOX_site-a carries thread_subscription_upserted → destSiteId site-b

sites:
  site-a:
    seed:
      users:
        alice: { verified: true }
      remote_users:
        remotebob:
          home_site: site-b
      rooms:
        - id: r-general
          name: General
          type: channel
      memberships:
        alice:
          - room: r-general
            roles: [member]
  site-b:
    seed:
      users:
        remotebob: { verified: true }

cassandra_data:
  - table: messages_by_id
    rows:
      - message_id: m0remoteparent000001
        created_at: 1748736000000
        room_id: r-general
        site_id: site-a
        msg: "the parent message, authored by a remote user"
        sender:
          id: u-remotebob
          account: remotebob
          eng_name: remotebob
          company_name: remotebob
  - table: messages_by_room
    rows:
      - room_id: r-general
        bucket: 1748736000000
        created_at: 1748736000000
        message_id: m0remoteparent000001
        site_id: site-a
        msg: "the parent message, authored by a remote user"
        sender:
          id: u-remotebob
          account: remotebob
          eng_name: remotebob
          company_name: remotebob

pre_fire_scripts:
  # prep-outbox.sh stays at drafts/ root: its $BASH_SOURCE/../../cmd/createoutbox
  # only resolves from that canonical depth. Referenced up one level from this
  # nested folder (pre_fire paths are relative to this scenario's dir).
  - ../prep-outbox.sh

input:
  site: site-a
  verb: jetstream_publish
  subject: chat.user.${alice.account}.room.r-general.site-a.msg.send
  payload:
    id: m1xsitethreadreply01
    content: replying to a thread started by a remote user
    requestId: 01970a4f-8c2d-7c9a-abcd-e01234567906
    threadParentMessageId: m0remoteparent000001
    threadParentMessageCreatedAt: 1748736000000
  credential: ${alice.credential}

expected:
  - location: jetstream_consume
    site: site-a
    args:
      stream: MESSAGES_CANONICAL_site-a
      filter_subject: chat.msg.canonical.site-a.created
    match:
      body_json:
        event: created
        message:
          id: m1xsitethreadreply01
          threadParentMessageId: m0remoteparent000001

  # Parent author (remotebob) subscribed LOCALLY on site-a — the local insert is
  # independent of the cross-site publish.
  - location: mongo_find
    site: site-a
    args:
      collection: thread_subscriptions
      filter:
        parentMessageId: m0remoteparent000001
        userAccount: remotebob
    match:
      userAccount: remotebob
    timeout: 10s

  - location: mongo_find
    site: site-a
    args:
      collection: thread_subscriptions
      filter:
        parentMessageId: m0remoteparent000001
        userAccount: ${alice.account}
    match:
      userAccount: ${alice.account}
    timeout: 10s

  # THE cross-site behavior: the worker published a thread_subscription_upserted
  # OUTBOX event on site-a, routed to remotebob's home site (site-b). Envelope-only
  # match (payload is base64-encoded).
  - location: jetstream_consume
    site: site-a
    args:
      stream: OUTBOX_site-a
      filter_subject: outbox.site-a.to.site-b.thread_subscription_upserted
    match:
      body_json:
        type: thread_subscription_upserted
        siteId: site-a
        destSiteId: site-b
    timeout: 10s
