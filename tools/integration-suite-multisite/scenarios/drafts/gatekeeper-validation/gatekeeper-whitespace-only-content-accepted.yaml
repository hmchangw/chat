scenario: gatekeeper-whitespace-only-content-accepted
source: >
  message-gatekeeper/handler.go:196-198 (processMessage rejects content ONLY when
  req.Content == "" — an exact empty-string check with no trimming), handler.go:201-206
  (the only other content gate is the 20KB size cap), message-worker/store_cassandra.go:86-105
  (SaveMessage persists Content verbatim into msg)
status: draft
tag: negative

# CANDIDATE FINDING (documents current behavior for a design ruling): the
# gatekeeper's non-empty content check is `req.Content == ""` — an exact
# empty-string comparison with NO trimming. So a whitespace-only message
# ("   ") is NOT empty by that test and is accepted, published, and
# persisted verbatim. A user can post blank-looking messages.
#
# Whether whitespace-only content should be rejected (trim-then-check) is a
# chat-app design call. This scenario documents that it currently is NOT.
# If the team rules it must reject, flip to tag:negative asserting a
# bad_request reply + no canonical, and this becomes the regression test.
#
# Surfaces: canonical published with the whitespace content; worker
# persisted it verbatim.

sites:
  site-a:
    seed:
      users:
        alice: { verified: true }
      rooms:
        - id: r-general
          name: General
          type: channel
      memberships:
        alice:
          - room: r-general
            roles: [member]

input:
  site: site-a
  verb: jetstream_publish
  subject: chat.user.${alice.account}.room.r-general.site-a.msg.send
  payload:
    id: m3whitespaceonly0001
    content: "   "
    requestId: 01970a4f-8c2d-7c9a-abcd-e01234567904
  credential: ${alice.credential}

# OPEN FINDING F-007 (validation consistency) — EXPECTED TO FAIL until the
# gatekeeper trims before its empty-check like the edit path does. -ve
# scenario asserting the CORRECT behavior; the failure IS the bug (draft +
# fail = open finding). Per AUTHORING.md §Pass/fail semantics.
expected:
  # CORRECT — a whitespace-only send must be rejected (the edit path already
  # treats whitespace as empty, history messages.go TrimSpace). EXPECTED: no
  # canonical produced. FAILS today because the gatekeeper's empty-check is
  # `req.Content == ""` (no trim), so "   " passes.
  - location: jetstream_consume
    site: site-a
    args:
      stream: MESSAGES_CANONICAL_site-a
      filter_subject: chat.msg.canonical.site-a.created
    not: true
    match:
      body_json:
        event: created
        message:
          id: m3whitespaceonly0001

  # CORRECT — and nothing should be persisted. EXPECTED: no row. FAILS today
  # (the whitespace message is written verbatim).
  - location: cassandra_select
    args:
      query: "SELECT JSON * FROM messages_by_id WHERE message_id = ?"
      params: [m3whitespaceonly0001]
    not: true
    match:
      message_id: m3whitespaceonly0001
      msg: "   "
    timeout: 10s
