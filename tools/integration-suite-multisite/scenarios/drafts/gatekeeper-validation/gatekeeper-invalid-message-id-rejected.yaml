scenario: gatekeeper-invalid-message-id-rejected
source: >
  message-gatekeeper/handler.go:186-189 (processMessage rejects a message id that fails
  idgen.IsValidMessageID — must be 17- or 20-char base62 — with errcode.BadRequest before any
  canonical publish), pkg/idgen (IsValidMessageID), pkg/errcode/classify.go:40 (Classify logs
  "request failed")
status: draft
tag: negative

# CONTRACT: the gatekeeper rejects a malformed message id (not base62 /
# wrong length) with bad_request and publishes no canonical event.
# "short123" is base62 but only 8 chars (valid ids are 17 or 20), so it
# fails IsValidMessageID. requestId is a valid UUID so the reply is
# routable. alice is a subscribed member so the id gate is the only
# rejection cause.

sites:
  site-a:
    seed:
      users:
        alice: { verified: true }
      rooms:
        - id: r-general
          name: General
          type: channel
      memberships:
        alice:
          - room: r-general
            roles: [member]

input:
  site: site-a
  verb: jetstream_publish
  subject: chat.user.${alice.account}.room.r-general.site-a.msg.send
  payload:
    id: short123
    content: message with a malformed id
    requestId: 01970a4f-8c2d-7c9a-abcd-e0123456790d
  credential: ${alice.credential}

expected:
  - location: nats_subscribe
    site: site-a
    args:
      subject: chat.user.${alice.account}.response.01970a4f-8c2d-7c9a-abcd-e0123456790d
    match:
      received:
        - body_json:
            code: bad_request

  - location: logs_tail
    site: site-a
    args:
      container: message-gatekeeper
    match:
      msg: request failed
      code: bad_request

  - location: jetstream_consume
    site: site-a
    args:
      stream: MESSAGES_CANONICAL_site-a
      filter_subject: chat.msg.canonical.site-a.created
    not: true
    match:
      body_json:
        message:
          id: short123
