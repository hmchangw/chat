scenario: edit-after-persist-succeeds
source: >
  history-service/internal/service/messages.go:283-323 (EditMessage → findMessage
  succeeds once the row exists; UpdateMessageContent + publishCanonicalBestEffort
  on chat.msg.canonical.{site}.updated), message-worker persists the send async;
  flow: shape gates the edit on that persistence. Contract complement to F-013
  (docs/integration-suite-multisite-findings.md).
status: draft
tag: positive

# FLOW: shape — the CONTRACT side of F-013, unauthorable without a gate.
#
# F-013 demonstrated the RACE: editing a just-sent message returns
# not_found because the edit's findMessage runs before message-worker
# persists the row. This scenario proves the flip side — once the message
# is OBSERVABLY persisted, the edit succeeds and the update propagates.
#
# The cassandra observation (persisted) IS the precondition: the flow waits
# for the worker's write before firing the edit, converting the F-013 race
# into a deterministic ordering. Without the gate this would be the F-013
# race (and flaky). Unique room r-editok to avoid F-009 cache bleed.

sites:
  site-a:
    seed:
      users:
        alice: { verified: true }
      rooms:
        - id: r-editok
          name: Edit OK
          type: channel
      memberships:
        alice:
          - room: r-editok
            roles: [member]

input:
  - id: send
    site: site-a
    verb: jetstream_publish
    subject: chat.user.${alice.account}.room.r-editok.site-a.msg.send
    payload:
      id: m0editokmsg000000001
      content: original content for edit
      requestId: 01970a4f-8c2d-7c9a-abcd-e01234567926
    credential: ${alice.credential}

  - id: edit
    site: site-a
    verb: nats_request
    subject: chat.user.${alice.account}.request.room.r-editok.site-a.msg.edit
    payload:
      messageId: m0editokmsg000000001
      newMsg: edited successfully
    credential: ${alice.credential}

expected:
  # THE GATE — wait until message-worker has persisted the send before
  # firing the edit. This is the precondition F-013 lacked.
  - id: persisted
    location: cassandra_select
    args:
      query: "SELECT JSON * FROM messages_by_id WHERE message_id = ?"
      params: [m0editokmsg000000001]
    match:
      message_id: m0editokmsg000000001
      msg: original content for edit
    timeout: 10s

  # The edit succeeds (reply carries the messageId, NOT an error code).
  - id: edit_ok
    location: reply
    of: edit
    match:
      body_json:
        messageId: m0editokmsg000000001

  # Tail parallel-observe barrier — the update propagated to the canonical
  # stream and the persisted row now holds the edited content.
  - id: edited_canonical
    location: jetstream_consume
    site: site-a
    args:
      stream: MESSAGES_CANONICAL_site-a
      filter_subject: chat.msg.canonical.site-a.updated
    match:
      body_json:
        event: updated
        message:
          id: m0editokmsg000000001
          content: edited successfully

  - id: edited_persisted
    location: cassandra_select
    args:
      query: "SELECT JSON * FROM messages_by_id WHERE message_id = ?"
      params: [m0editokmsg000000001]
    match:
      message_id: m0editokmsg000000001
      msg: edited successfully

flow: send >> persisted >> edit >> edit_ok >> [edited_canonical, edited_persisted]
