server_name: nats-site-b
# Leafnode spoke. site-b dials into site-a's leaf hub using backend.creds
# (same chatapp account as site-a). See docs/integration-suite-multisite-
# findings.md F-001 for the trail.
leafnodes: {
  remotes: [
    {
      url: nats-leaf://nats-site-a:7422
      credentials: /etc/nats/backend.creds
    }
  ]
}
jetstream: {
  domain: site-b
  store_dir: /data/jetstream
}
