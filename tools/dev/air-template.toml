# Air live-reload config template. The dev.sh wrapper substitutes
# %SERVICE% with the target service name before invoking air.
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o tmp/%SERVICE% ./%SERVICE%/"
  bin = "tmp/%SERVICE%"
  full_bin = "tmp/%SERVICE%"
  include_ext = ["go"]
  include_dir = ["%SERVICE%", "pkg"]
  exclude_dir = ["tmp", ".cache", "chat-frontend", "docker-local", "docs", "tools", ".git", ".github", ".claude"]
  exclude_regex = ["_test\\.go$", "mock_.*\\.go$"]
  delay = 500
  stop_on_error = true
  send_interrupt = true
  kill_delay = 2000

[log]
  time = true

[misc]
  clean_on_exit = true
