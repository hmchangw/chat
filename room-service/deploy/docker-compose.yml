name: ${SITE_ID:-site-a}-room-service

services:
  room-service:
    build:
      context: ../..
      dockerfile: room-service/deploy/Dockerfile
    container_name: ${SITE_ID:-site-a}-room-service
    environment:
      - SITE_ID=${SITE_ID:-site-a}
      - NATS_URL=nats://${NATS_HOST:-nats-a}:4222
      - NATS_CREDS_FILE=/etc/nats/backend.creds
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=chat_${SITE_ID:-site-a}
      - MAX_ROOM_SIZE=1000
      - MAX_BATCH_SIZE=500
      - VALKEY_ADDRS=valkey:6379
      - VALKEY_KEY_GRACE_PERIOD=24h
      - CASSANDRA_HOSTS=cassandra
      - CASSANDRA_KEYSPACE=chat_${SITE_ID:-site-a}
      - BOOTSTRAP_STREAMS=true
    volumes:
      - ../../docker-local/${SITE_ID:-site-a}/backend.creds:/etc/nats/backend.creds:ro
    networks:
      - chat-local

networks:
  chat-local:
    external: true
