name: chat-local-nats

services:
  nats:
    image: nats:2.11-alpine
    container_name: chat-local-nats
    ports:
      - "4222:4222"
      - "8222:8222"
      - "9222:9222"
    volumes:
      - ./nats.conf:/etc/nats/nats.conf:ro
      - nats-data:/data/jetstream
    command: ["-c", "/etc/nats/nats.conf", "-DV", "-T"]
    networks:
      - chat-local

volumes:
  nats-data:

networks:
  chat-local:
    name: chat-local
