# docker-local/e2e/nats/nats-a.conf
# Site A NATS server. Forms a supercluster with site B via gateway on port 7222.

# Operator + chatapp account + SYS resolver_preload + system_account directive,
# generated by docker-local/e2e/setup-e2e.sh into secrets/auth.conf and mounted
# at /etc/nats/auth.conf by the compose file. Shared verbatim with nats-b.conf
# so JWTs minted on either site are accepted by both clusters.
include "auth.conf"

server_name: nats-a
listen:      0.0.0.0:4222
http_port:   8222

jetstream {
  store_dir: /data/jetstream
}

cluster {
  name:   siteA
  listen: 0.0.0.0:6222
  routes: ["nats-route://127.0.0.1:6222"]
}

gateway {
  name:    siteA
  listen:  0.0.0.0:7222
  gateways: [
    { name: siteB, urls: ["nats://nats-b:7222"] }
  ]
}
