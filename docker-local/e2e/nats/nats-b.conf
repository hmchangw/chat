# docker-local/e2e/nats/nats-b.conf
# Site B NATS server. Symmetric to nats-a.conf.

server_name: nats-b
listen:      0.0.0.0:4222
http_port:   8222

jetstream {
  store_dir: /data/jetstream
}

cluster {
  name:   siteB
  listen: 0.0.0.0:6222
  routes: []
}

gateway {
  name:    siteB
  listen:  0.0.0.0:7222
  gateways: [
    { name: siteA, urls: ["nats://nats-a:7222"] }
  ]
}
