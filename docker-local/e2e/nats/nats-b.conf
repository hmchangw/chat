# docker-local/e2e/nats/nats-b.conf
# Site B NATS server. Symmetric to nats-a.conf.

# Operator + chatapp account + SYS resolver_preload + system_account directive,
# generated by docker-local/e2e/setup-e2e.sh into secrets/auth.conf and mounted
# at /etc/nats/auth.conf by the compose file. Shared verbatim with nats-a.conf
# so JWTs minted on either site are accepted by both clusters.
include "auth.conf"

server_name: nats-b
listen:      0.0.0.0:4222
http_port:   8222

jetstream {
  store_dir: /data/jetstream
}

cluster {
  name:   siteB
  listen: 0.0.0.0:6222
  routes: ["nats-route://127.0.0.1:6222"]
}

gateway {
  name:    siteB
  listen:  0.0.0.0:7222
  gateways: [
    { name: siteA, urls: ["nats://nats-a:7222"] }
  ]
}
