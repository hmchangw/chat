name: inbox-worker

services:
  inbox-worker:
    build:
      context: ../..
      dockerfile: inbox-worker/deploy/Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
      - NATS_CREDS_FILE=/etc/nats/backend.creds
      - SITE_ID=site-local
      - MONGO_URI=mongodb://mongodb:27017
      - MONGO_DB=chat
      # Valkey is required (inbox-worker refuses to start without VALKEY_ADDR).
      # Provided by docker-local/compose.deps.yaml; production deploys must supply it externally.
      - VALKEY_ADDR=valkey:6379
      - VALKEY_KEY_GRACE_PERIOD=24h
      - ROOM_KEY_RPC_TIMEOUT=5s
      - ROOM_KEY_MAX_REDELIVER=10
      - BOOTSTRAP_STREAMS=true
    volumes:
      - ../../docker-local/backend.creds:/etc/nats/backend.creds:ro
    networks:
      - chat-local

networks:
  chat-local:
    external: true
