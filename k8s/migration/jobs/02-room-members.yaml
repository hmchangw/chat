# Phase 2 — room_members
# Source:  rocketchat.tsmc_room_members
# Target:  chat.room_members
# Depends: chat.users must exist (Phase 1 must complete first)
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-room-members
  namespace: migration
spec:
  backoffLimit: 10
  activeDeadlineSeconds: 3600   # ~1.45M members takes ~5 min
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: migrate-room-members
        image: ${MIGRATION_IMAGE}
        command: ["/migrate-room-members"]
        envFrom:
        - configMapRef:
            name: migration-config
        env:
        - name: SOURCE_MONGO_URI
          valueFrom:
            secretKeyRef:
              name: migration-vault-secret   # REPLACE with the name your VaultSecret creates
              key: SOURCE_MONGO_URI
        - name: TARGET_MONGO_URI
          valueFrom:
            secretKeyRef:
              name: migration-vault-secret
              key: TARGET_MONGO_URI
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "512Mi"
