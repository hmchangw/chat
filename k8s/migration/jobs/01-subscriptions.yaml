# Phase 1 — subscriptions
# Source:  rocketchat.rocketchat_subscription + rocketchat.rocketchat_room (for room type)
# Target:  chat.subscriptions
# Depends: nothing (reads source only)
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-subscriptions
  namespace: migration
spec:
  backoffLimit: 10
  activeDeadlineSeconds: 5400   # ~7.4M subscriptions takes ~25 min
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: migrate-subscriptions
        image: ${MIGRATION_IMAGE}
        command: ["/migrate-subscriptions"]
        envFrom:
        - configMapRef:
            name: migration-config
        - secretRef:
            name: migration-secrets
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "512Mi"
