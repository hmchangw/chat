# Phase 3 — thread_subscriptions
# Source:  rocketchat.tsmc_thread_subscriptions
# Target:  chat.thread_subscriptions
# Depends: chat.thread_rooms must be complete (Phase 2 gate)
#          chat.users must exist (Phase 1)
#
# For each source document: if threadRoomId is already set it is copied directly.
# If it is empty (legacy docs), the job looks up chat.thread_rooms by parentMessageId
# to derive the value. Threads outside the message window are skipped with a warning.
#
# Runs in parallel with the four Cassandra jobs — both groups depend only on
# thread_rooms being complete, not on each other.
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-thread-subscriptions
  namespace: migration
spec:
  backoffLimit: 10
  activeDeadlineSeconds: 3600   # ~2.4M docs takes ~8 min
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: migrate-thread-subscriptions
        image: ${MIGRATION_IMAGE}
        command: ["/migrate-thread-subscriptions"]
        envFrom:
        - configMapRef:
            name: migration-config
        env:
        - name: SOURCE_MONGO_URI
          valueFrom:
            secretKeyRef:
              name: migration-vault-secret   # REPLACE with the name your VaultSecret creates
              key: SOURCE_MONGO_URI
        - name: TARGET_MONGO_URI
          valueFrom:
            secretKeyRef:
              name: migration-vault-secret
              key: TARGET_MONGO_URI
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "512Mi"
