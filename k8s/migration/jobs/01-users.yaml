# Phase 1 — users
# Source:  rocketchat.users
# Target:  chat.users
# Depends: nothing (reads source only)
apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-users
  namespace: migration
spec:
  backoffLimit: 10
  activeDeadlineSeconds: 3600   # 1-hour hard cap; ~90K users takes < 1 min
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: migrate-users
        image: ${MIGRATION_IMAGE}
        command: ["/migrate-users"]
        envFrom:
        - configMapRef:
            name: migration-config
        - secretRef:
            name: migration-secrets
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "1"
            memory: "512Mi"
