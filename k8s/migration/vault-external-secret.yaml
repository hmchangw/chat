# External Secrets Operator — ExternalSecret
#
# Maps Vault secret fields → K8s Secret keys.
# ESO creates and keeps the K8s Secret "migration-secrets" in sync with Vault.
# The migration Job pods already reference this secret via envFrom secretRef —
# no changes to job YAMLs are needed.
#
# Vault secret to create before applying this file:
#   vault kv put kv/migration/prod \
#     source_mongo_uri="mongodb://user:pass@source:27017/rocketchat?authSource=admin" \
#     target_mongo_uri="mongodb://user:pass@target:27017/chat?authSource=admin" \
#     cassandra_hosts="cassandra-host-1,cassandra-host-2" \
#     cassandra_user="cassandra" \
#     cassandra_password="your-password"
#
# Apply with:
#   kubectl apply -f vault-secretstore.yaml
#   kubectl apply -f vault-external-secret.yaml
#
# Verify the sync worked:
#   kubectl get externalsecret migration-secrets -n migration
#   kubectl get secret migration-secrets -n migration

apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: migration-secrets
  namespace: migration
spec:
  refreshInterval: 1h         # re-sync from Vault every hour
  secretStoreRef:
    name: vault-migration
    kind: SecretStore
  target:
    name: migration-secrets   # name of the K8s Secret to create/maintain
    creationPolicy: Owner     # ESO owns the secret — deleting ExternalSecret deletes the K8s Secret too
    deletionPolicy: Retain    # keep the K8s Secret if ExternalSecret is deleted (safe for migration)
  data:
    # Each entry maps one Vault field to one K8s Secret key.
    # key = Vault path relative to the mount (kv/data/<key>)
    # property = field name inside the Vault secret document

    - secretKey: SOURCE_MONGO_URI
      remoteRef:
        key: migration/prod
        property: source_mongo_uri

    - secretKey: TARGET_MONGO_URI
      remoteRef:
        key: migration/prod
        property: target_mongo_uri

    - secretKey: CASSANDRA_HOSTS
      remoteRef:
        key: migration/prod
        property: cassandra_hosts

    - secretKey: CASSANDRA_USER
      remoteRef:
        key: migration/prod
        property: cassandra_user

    - secretKey: CASSANDRA_PASSWORD
      remoteRef:
        key: migration/prod
        property: cassandra_password
