# ── THIS FILE IS FOR LOCAL / EMERGENCY USE ONLY ──────────────────────────────
#
# In production, secrets are managed via Vault using one of two approaches:
#   Option A (recommended): External Secrets Operator
#     kubectl apply -f vault-secretstore.yaml -f vault-external-secret.yaml
#     ESO creates and maintains the "migration-secrets" K8s Secret automatically.
#
#   Option B: GitLab CI Vault JWT (see gitlab-ci.yml setup:sync-vault-secrets)
#     The pipeline fetches from Vault and creates the secret at run time.
#
# Use this file ONLY if you need to run locally without Vault access:
#   1. Fill in the real values below
#   2. kubectl apply -f secret.yaml -n migration
#   3. DO NOT commit with real credentials — this file is in .gitignore or left as template
#
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: migration-secrets
  namespace: migration
type: Opaque
stringData:
  SOURCE_MONGO_URI: "mongodb://user:pass@source-host:27017/rocketchat?authSource=admin"
  TARGET_MONGO_URI: "mongodb://user:pass@target-host:27017/chat?authSource=admin"
  # Comma-separated Cassandra hosts (host:port or just host)
  CASSANDRA_HOSTS: "cassandra-host-1,cassandra-host-2"
  CASSANDRA_USER: "cassandra"
  CASSANDRA_PASSWORD: "REPLACE_ME"
