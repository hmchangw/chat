# Fill in real values, then apply with:
#   kubectl apply -f secret.yaml -n migration
#
# DO NOT commit this file with real credentials.
# Use a secrets manager (Vault, Azure Key Vault, Sealed Secrets) in production.
apiVersion: v1
kind: Secret
metadata:
  name: migration-secrets
  namespace: migration
type: Opaque
stringData:
  SOURCE_MONGO_URI: "mongodb://user:pass@source-host:27017/rocketchat?authSource=admin"
  TARGET_MONGO_URI: "mongodb://user:pass@target-host:27017/chat?authSource=admin"
  # Comma-separated Cassandra hosts (host:port or just host)
  CASSANDRA_HOSTS: "cassandra-host-1,cassandra-host-2"
  CASSANDRA_USER: "cassandra"
  CASSANDRA_PASSWORD: "REPLACE_ME"
