# External Secrets Operator — SecretStore
#
# Tells ESO how to connect to Vault and authenticate.
# ESO uses Kubernetes auth: it presents its own service account token to Vault,
# which exchanges it for a Vault token with the "migration-reader" policy.
#
# Prerequisites:
#   1. External Secrets Operator installed in the cluster:
#        helm repo add external-secrets https://charts.external-secrets.io
#        helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
#
#   2. Vault Kubernetes auth method enabled and configured:
#        vault auth enable kubernetes
#        vault write auth/kubernetes/config \
#          kubernetes_host="https://<K8S_API_URL>" \
#          token_reviewer_jwt="<ESO_SA_TOKEN>"
#
#   3. Vault policy granting read access to the migration secret path:
#        vault policy write migration-reader - <<EOF
#        path "kv/data/migration/*" { capabilities = ["read"] }
#        EOF
#
#   4. Vault Kubernetes auth role binding the ESO service account to the policy:
#        vault write auth/kubernetes/role/migration-reader \
#          bound_service_account_names=external-secrets \
#          bound_service_account_namespaces=external-secrets \
#          policies=migration-reader \
#          ttl=1h

apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-migration
  namespace: migration
spec:
  provider:
    vault:
      server: "https://vault.example.com"   # REPLACE with your Vault URL
      path: "kv"                             # KV v2 mount path (vault secrets engine name)
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"            # Vault auth method mount path
          role: "migration-reader"           # Vault role created in step 4 above
