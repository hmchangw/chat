# TEST ONLY — In production this Secret is created by the VaultSecret CRD.
# This template lets you run the chart on a plain cluster to validate that
# secretKeyRef injection works before wiring in Vault.
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secret
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "migration.labels" . | nindent 4 }}
  annotations:
    helm.sh/note: "Replace with your VaultSecret resource in production"
type: Opaque
stringData:
  SOURCE_MONGO_URI:   {{ .Values.secret.sourceMongoUri | quote }}
  TARGET_MONGO_URI:   {{ .Values.secret.targetMongoUri | quote }}
  CASSANDRA_HOSTS:    {{ .Values.secret.cassandraHosts | quote }}
  CASSANDRA_USER:     {{ .Values.secret.cassandraUser | quote }}
  CASSANDRA_PASSWORD: {{ .Values.secret.cassandraPassword | quote }}
