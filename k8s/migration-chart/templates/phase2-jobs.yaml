# ── Phase 2 — Derived + Dependent (hook-weight 20) ───────────────────────────
# Helm only starts these after ALL weight-10 (Phase 1) hooks succeed.
# thread-rooms is the CRITICAL gate — Phase 3 won't start until it completes
# because all three Phase 2 jobs must finish before weight-30 begins.
# Mirrors: 02-room-members, 02-thread-rooms, 02-thread-subscriptions
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-p2-room-members
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "migration.labels" . | nindent 4 }}
    migration/phase: "2"
  annotations:
    helm.sh/hook:               post-install
    helm.sh/hook-weight:        "20"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        migration/phase: "2"
        migration/job: p2-room-members
    spec:
      restartPolicy: OnFailure
      containers:
      - name: p2-room-members
        image: {{ .Values.image }}
        command:
        - /bin/sh
        - -c
        - |
          echo "[migrate-room-members] START — tsmc_room_members → chat.room_members"
          echo "  Depends on: chat.users (Phase 1 gate passed)"
          echo "  SOURCE_MONGO_URI set: $([ -n "$SOURCE_MONGO_URI" ] && echo YES || echo NO)"
          echo "  TARGET_MONGO_URI set: $([ -n "$TARGET_MONGO_URI" ] && echo YES || echo NO)"
          sleep {{ .Values.phase2SleepSeconds }}
          echo "[migrate-room-members] DONE"
        {{- include "migration.commonEnv" . | nindent 8 }}
        resources:
          requests: { cpu: "100m", memory: "64Mi" }
          limits:   { cpu: "200m", memory: "128Mi" }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-p2-thread-rooms
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "migration.labels" . | nindent 4 }}
    migration/phase: "2"
  annotations:
    helm.sh/hook:               post-install
    helm.sh/hook-weight:        "20"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        migration/phase: "2"
        migration/job: p2-thread-rooms
    spec:
      restartPolicy: OnFailure
      containers:
      - name: p2-thread-rooms
        image: {{ .Values.image }}
        command:
        - /bin/sh
        - -c
        - |
          echo "[migrate-thread-rooms] START — DERIVED from rocketchat_message (tcount>0)"
          echo "  CRITICAL GATE: Phase 3 Cassandra jobs need thread_rooms to resolve thread_room_id"
          echo "  MESSAGE_START_DATE_MS=$MESSAGE_START_DATE_MS  CUTOFF_TIMESTAMP=$CUTOFF_TIMESTAMP"
          echo "  SOURCE_MONGO_URI set: $([ -n "$SOURCE_MONGO_URI" ] && echo YES || echo NO)"
          echo "  TARGET_MONGO_URI set: $([ -n "$TARGET_MONGO_URI" ] && echo YES || echo NO)"
          sleep {{ .Values.phase2SleepSeconds }}
          echo "[migrate-thread-rooms] DONE — thread_rooms collection ready for Phase 3"
        {{- include "migration.commonEnv" . | nindent 8 }}
        resources:
          requests: { cpu: "100m", memory: "64Mi" }
          limits:   { cpu: "200m", memory: "128Mi" }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-p2-thread-subscriptions
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "migration.labels" . | nindent 4 }}
    migration/phase: "2"
  annotations:
    helm.sh/hook:               post-install
    helm.sh/hook-weight:        "20"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        migration/phase: "2"
        migration/job: p2-thread-subscriptions
    spec:
      restartPolicy: OnFailure
      containers:
      - name: p2-thread-subscriptions
        image: {{ .Values.image }}
        command:
        - /bin/sh
        - -c
        - |
          echo "[migrate-thread-subscriptions] START — tsmc_thread_subscriptions → chat.thread_subscriptions"
          echo "  SOURCE_MONGO_URI set: $([ -n "$SOURCE_MONGO_URI" ] && echo YES || echo NO)"
          sleep {{ .Values.phase2SleepSeconds }}
          echo "[migrate-thread-subscriptions] DONE"
        {{- include "migration.commonEnv" . | nindent 8 }}
        resources:
          requests: { cpu: "100m", memory: "64Mi" }
          limits:   { cpu: "200m", memory: "128Mi" }
