# ── Phase 1 — Foundation (hook-weight 10) ────────────────────────────────────
# All four jobs start simultaneously. Helm waits for ALL weight-10 hooks to
# reach Complete before it applies any weight-20 (Phase 2) resources.
# Mirrors: 01-users, 01-rooms, 01-subscriptions, 01-avatars
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-p1-users
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "migration.labels" . | nindent 4 }}
    migration/phase: "1"
  annotations:
    helm.sh/hook:               post-install
    helm.sh/hook-weight:        "10"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        migration/phase: "1"
        migration/job: p1-users
    spec:
      restartPolicy: OnFailure
      containers:
      - name: p1-users
        image: {{ .Values.image }}
        command:
        - /bin/sh
        - -c
        - |
          echo "[migrate-users] START — rocketchat.users → chat.users"
          echo "  SITE_ID=$SITE_ID  SOURCE_DB=$SOURCE_DB  TARGET_DB=$TARGET_DB"
          echo "  CUTOFF_TIMESTAMP=$CUTOFF_TIMESTAMP"
          echo "  SOURCE_MONGO_URI set: $([ -n "$SOURCE_MONGO_URI" ] && echo YES || echo NO)"
          echo "  TARGET_MONGO_URI set: $([ -n "$TARGET_MONGO_URI" ] && echo YES || echo NO)"
          sleep {{ .Values.phase1SleepSeconds }}
          echo "[migrate-users] DONE"
        {{- include "migration.commonEnv" . | nindent 8 }}
        resources:
          requests: { cpu: "100m", memory: "64Mi" }
          limits:   { cpu: "200m", memory: "128Mi" }
