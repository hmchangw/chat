# Demo client for history-service.
# Expects history-service infra to be running first:
#   cd history-service/docker-local && docker compose up -d
#
# Then run the demo:
#   cd history-service-demo && docker compose up

services:
  demo:
    build:
      context: ..
      dockerfile: history-service-demo/Dockerfile
    environment:
      NATS_URL: nats://nats:4222
      MONGO_URI: mongodb://mongodb:27017
      MONGO_DB: chat
      CASSANDRA_HOSTS: cassandra
      CASSANDRA_KEYSPACE: chat
    networks:
      - history-service_default

networks:
  history-service_default:
    external: true
    name: docker-local_default
