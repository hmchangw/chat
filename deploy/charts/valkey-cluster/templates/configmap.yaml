apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "valkey-cluster.configMapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "valkey-cluster.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
data:
  valkey.conf: |
    # Generated by chart {{ include "valkey-cluster.chart" . }} — do not edit in cluster.
    bind 0.0.0.0 -::*
    port {{ .Values.cluster.clientPort }}
    protected-mode no

    # Cluster
    cluster-enabled yes
    cluster-config-file /data/nodes.conf
    cluster-node-timeout {{ .Values.cluster.nodeTimeoutMs }}
    cluster-require-full-coverage {{ ternary "yes" "no" .Values.cluster.requireFullCoverage }}
    cluster-announce-port {{ .Values.cluster.clientPort }}
    cluster-announce-bus-port {{ .Values.cluster.busPort }}

    # Persistence
    dir /data
    appendonly {{ ternary "yes" "no" .Values.config.appendOnly }}
    appendfsync {{ .Values.config.appendFsync }}
    {{- range .Values.config.save }}
    save {{ . }}
    {{- end }}

    # Memory
    {{- if .Values.config.maxmemory }}
    maxmemory {{ .Values.config.maxmemory }}
    {{- end }}
    maxmemory-policy {{ .Values.config.maxmemoryPolicy }}

    # Logging (stdout for Kubernetes log collection)
    logfile ""

    # Extra (user-supplied)
    {{- if .Values.config.extra }}
    {{ .Values.config.extra | nindent 4 }}
    {{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "valkey-cluster.scriptsConfigMapName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "valkey-cluster.labels" . | nindent 4 }}
data:
  entrypoint.sh: |
    #!/bin/sh
    set -eu

    # Build a working copy of valkey.conf into the writable /tmp (root FS is read-only).
    install -m 0644 /etc/valkey/valkey.conf /tmp/valkey.conf

    POD_FQDN="${POD_NAME}.{{ include "valkey-cluster.headlessServiceName" . }}.${POD_NAMESPACE}.svc.cluster.local"
    echo "cluster-announce-hostname ${POD_FQDN}" >> /tmp/valkey.conf
    echo "cluster-preferred-endpoint-type hostname" >> /tmp/valkey.conf

    if [ -n "${VALKEY_PASSWORD:-}" ]; then
      echo "requirepass ${VALKEY_PASSWORD}" >> /tmp/valkey.conf
      echo "masterauth ${VALKEY_PASSWORD}" >> /tmp/valkey.conf
    fi

    exec valkey-server /tmp/valkey.conf

  liveness.sh: |
    #!/bin/sh
    # vc: invoke valkey-cli against localhost with auth iff a password is set.
    vc() {
      if [ -n "${VALKEY_PASSWORD:-}" ]; then
        valkey-cli -h 127.0.0.1 -p {{ .Values.cluster.clientPort }} -a "${VALKEY_PASSWORD}" --no-auth-warning "$@"
      else
        valkey-cli -h 127.0.0.1 -p {{ .Values.cluster.clientPort }} "$@"
      fi
    }
    response=$(vc PING 2>&1)
    [ "${response}" = "PONG" ] || [ "${response}" = "LOADING Valkey is loading the dataset in memory" ]

  readiness.sh: |
    #!/bin/sh
    vc() {
      if [ -n "${VALKEY_PASSWORD:-}" ]; then
        valkey-cli -h 127.0.0.1 -p {{ .Values.cluster.clientPort }} -a "${VALKEY_PASSWORD}" --no-auth-warning "$@"
      else
        valkey-cli -h 127.0.0.1 -p {{ .Values.cluster.clientPort }} "$@"
      fi
    }
    response=$(vc PING 2>&1)
    [ "${response}" = "PONG" ]

  pre-stop.sh: |
    #!/bin/sh
    # Graceful shutdown: if this pod is a master, instruct one of its
    # replicas to take over BEFORE this pod terminates. CLUSTER FAILOVER
    # must be issued ON the replica, not on the master being demoted.
    # Replicas just exit cleanly with no extra work.
    set -eu
    vc() {
      if [ -n "${VALKEY_PASSWORD:-}" ]; then
        valkey-cli -h 127.0.0.1 -p {{ .Values.cluster.clientPort }} -a "${VALKEY_PASSWORD}" --no-auth-warning "$@"
      else
        valkey-cli -h 127.0.0.1 -p {{ .Values.cluster.clientPort }} "$@"
      fi
    }
    # vc_remote HOST PORT [args...]: run a command against a different node.
    vc_remote() {
      _h=$1; _p=$2; shift 2
      if [ -n "${VALKEY_PASSWORD:-}" ]; then
        valkey-cli -h "${_h}" -p "${_p}" -a "${VALKEY_PASSWORD}" --no-auth-warning "$@"
      else
        valkey-cli -h "${_h}" -p "${_p}" "$@"
      fi
    }

    role=$(vc INFO replication 2>/dev/null | awk -F: '/^role:/ {print $2}' | tr -d '\r')
    if [ "${role}" != "master" ]; then
      echo "preStop: ${POD_NAME} is a replica, exiting cleanly"
      exit 0
    fi

    my_id=$(vc CLUSTER MYID 2>/dev/null | tr -d '\r')
    echo "preStop: ${POD_NAME} is a master (id=${my_id}), looking for a replica to promote"

    # Find a healthy replica whose master is THIS node. CLUSTER NODES columns:
    # <id> <ip:port@bus,hostname> <flags> <master> ... — flags include "slave".
    target=$(vc CLUSTER NODES 2>/dev/null \
      | awk -v mid="${my_id}" '$0 ~ "slave" && $4 == mid && $0 !~ "fail" {print $2; exit}')

    if [ -z "${target}" ]; then
      echo "preStop: no healthy replica found, exiting without failover"
      exit 0
    fi

    # target is "host:port@bus,hostname" — strip everything after ":" then ","
    target_host=$(echo "${target}" | sed 's/[:,].*//')
    target_port=$(echo "${target}" | sed 's/.*://;s/@.*//')
    echo "preStop: triggering CLUSTER FAILOVER on replica ${target_host}:${target_port}"
    vc_remote "${target_host}" "${target_port}" CLUSTER FAILOVER || true

    # Wait until OUR role flips to slave, bounded by gracefulShutdown.timeoutSeconds.
    deadline=$(( $(date +%s) + {{ .Values.lifecycle.gracefulShutdown.timeoutSeconds }} ))
    while [ "$(date +%s)" -lt "${deadline}" ]; do
      role=$(vc INFO replication 2>/dev/null | awk -F: '/^role:/ {print $2}' | tr -d '\r')
      if [ "${role}" = "slave" ]; then
        echo "preStop: failover complete, ${POD_NAME} is now a replica"
        exit 0
      fi
      sleep 2
    done
    echo "preStop: failover did not complete within timeout, proceeding with termination"
    exit 0
