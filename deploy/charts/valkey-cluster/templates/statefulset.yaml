apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "valkey-cluster.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "valkey-cluster.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  serviceName: {{ include "valkey-cluster.headlessServiceName" . }}
  replicas: {{ include "valkey-cluster.totalNodes" . }}
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  selector:
    matchLabels:
      {{- include "valkey-cluster.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "valkey-cluster.podLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "valkey-cluster.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      affinity:
        {{- include "valkey-cluster.podAntiAffinity" . | nindent 8 }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . }}
      {{- end }}
      {{- if or .Values.initContainers.volumePermissions.enabled .Values.initContainers.sysctl.enabled }}
      initContainers:
        {{- if .Values.initContainers.volumePermissions.enabled }}
        - name: volume-permissions
          image: "{{ .Values.initContainers.volumePermissions.image.registry }}/{{ .Values.initContainers.volumePermissions.image.repository }}:{{ .Values.initContainers.volumePermissions.image.tag }}"
          imagePullPolicy: {{ .Values.initContainers.volumePermissions.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              chown -R {{ .Values.podSecurityContext.runAsUser }}:{{ .Values.podSecurityContext.fsGroup }} /data
              chmod -R 0750 /data
          securityContext:
            runAsUser: 0
            runAsNonRoot: false
          resources:
            {{- toYaml .Values.initContainers.volumePermissions.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
        {{- end }}
        {{- if .Values.initContainers.sysctl.enabled }}
        - name: sysctl
          image: "{{ .Values.initContainers.sysctl.image.registry }}/{{ .Values.initContainers.sysctl.image.repository }}:{{ .Values.initContainers.sysctl.image.tag }}"
          imagePullPolicy: {{ .Values.initContainers.sysctl.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              {{- range .Values.initContainers.sysctl.commands }}
              {{ . }}
              {{- end }}
          securityContext:
            privileged: true
            runAsUser: 0
            runAsNonRoot: false
          resources:
            {{- toYaml .Values.initContainers.sysctl.resources | nindent 12 }}
        {{- end }}
      {{- end }}
      {{- with .Values.extraInitContainers }}
      {{- if not (or $.Values.initContainers.volumePermissions.enabled $.Values.initContainers.sysctl.enabled) }}
      initContainers:
      {{- end }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: valkey
          image: {{ include "valkey-cluster.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/bin/sh", "/scripts/entrypoint.sh"]
          ports:
            - name: client
              containerPort: {{ .Values.cluster.clientPort }}
              protocol: TCP
            - name: gossip
              containerPort: {{ .Values.cluster.busPort }}
              protocol: TCP
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if .Values.auth.enabled }}
            - name: VALKEY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "valkey-cluster.secretName" . }}
                  key: {{ include "valkey-cluster.secretPasswordKey" . }}
            {{- end }}
            {{- with .Values.extraEnvVars }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.lifecycle.gracefulShutdown.enabled }}
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "/scripts/pre-stop.sh"]
          {{- end }}
          {{- if .Values.probes.liveness.enabled }}
          livenessProbe:
            exec:
              command: ["/bin/sh", "/scripts/liveness.sh"]
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.readiness.enabled }}
          readinessProbe:
            exec:
              command: ["/bin/sh", "/scripts/readiness.sh"]
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- end }}
          {{- if .Values.probes.startup.enabled }}
          startupProbe:
            exec:
              command: ["/bin/sh", "/scripts/liveness.sh"]
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/valkey
              readOnly: true
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: tmp
              mountPath: /tmp
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
        {{- with .Values.extraContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.metrics.enabled }}
        - name: metrics
          image: {{ include "valkey-cluster.metricsImage" . }}
          imagePullPolicy: {{ .Values.metrics.image.pullPolicy }}
          env:
            - name: REDIS_ADDR
              value: "redis://127.0.0.1:{{ .Values.cluster.clientPort }}"
            {{- if .Values.auth.enabled }}
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "valkey-cluster.secretName" . }}
                  key: {{ include "valkey-cluster.secretPasswordKey" . }}
            {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.metrics.resources | nindent 12 }}
          {{- with .Values.metrics.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "valkey-cluster.configMapName" . }}
        - name: scripts
          configMap:
            name: {{ include "valkey-cluster.scriptsConfigMapName" . }}
            defaultMode: 0755
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
        {{- if not .Values.persistence.enabled }}
        - name: data
          emptyDir: {}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          {{- include "valkey-cluster.labels" . | nindent 10 }}
        {{- with .Values.persistence.annotations }}
        annotations:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      spec:
        accessModes:
          {{- toYaml .Values.persistence.accessModes | nindent 10 }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass | quote }}
        {{- end }}
  {{- end }}
