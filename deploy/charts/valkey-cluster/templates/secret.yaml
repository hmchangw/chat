{{- if and .Values.auth.enabled (not .Values.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "valkey-cluster.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "valkey-cluster.labels" . | nindent 4 }}
  {{- with .Values.commonAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
type: Opaque
data:
  {{- $existing := lookup "v1" "Secret" .Release.Namespace (include "valkey-cluster.secretName" .) }}
  {{- $passwordKey := include "valkey-cluster.secretPasswordKey" . }}
  {{- if .Values.auth.password }}
  {{ $passwordKey }}: {{ .Values.auth.password | b64enc | quote }}
  {{- else if and $existing (index $existing.data $passwordKey) }}
  {{ $passwordKey }}: {{ index $existing.data $passwordKey | quote }}
  {{- else }}
  {{ $passwordKey }}: {{ randAlphaNum 32 | b64enc | quote }}
  {{- end }}
{{- end }}
