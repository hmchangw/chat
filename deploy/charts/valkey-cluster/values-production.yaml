# ----------------------------------------------------------------------------
# Production-shaped values for valkey-cluster.
#
# This file is a starting template, not a drop-in. Tune the highlighted
# sections (image registry, storage class, namespace, allowedClients, resources,
# maxmemory) to your environment before installing.
#
# Recommended install:
#   kubectl create namespace valkey
#   kubectl -n valkey create secret generic valkey-cluster-auth \
#     --from-literal=valkey-password="$(openssl rand -base64 32 | tr -d /+= | head -c 32)"
#   helm install valkey-cluster ./deploy/charts/valkey-cluster \
#     -n valkey -f deploy/charts/valkey-cluster/values-production.yaml \
#     --wait --timeout 10m
#   helm test valkey-cluster -n valkey
# ----------------------------------------------------------------------------

# ── Image (point at your mirrored registry) ─────────────────────────────────
image:
  registry: registry.example.com       # TODO: your internal mirror
  repository: valkey/valkey
  tag: "8.1.4-alpine"
  pullPolicy: IfNotPresent
  pullSecrets: []
  # - name: registry-credentials

# ── Topology ────────────────────────────────────────────────────────────────
cluster:
  masters: 3
  replicasPerMaster: 1                 # 3+3 = 6 pods, the standard prod layout
  nodeTimeoutMs: 15000
  requireFullCoverage: true
  init:
    enabled: true
    podReadyTimeoutSeconds: 300
  scaleAutomation:
    enabled: true
    slotsPerMove: 100

# ── Auth (always use existingSecret in prod) ────────────────────────────────
auth:
  enabled: true
  existingSecret: valkey-cluster-auth  # MUST exist BEFORE helm install
  existingSecretPasswordKey: valkey-password

# ── Valkey config ───────────────────────────────────────────────────────────
config:
  maxmemory: "1500mb"                  # TODO: set to ~70% of container limit
  maxmemoryPolicy: "noeviction"        # noeviction for state, allkeys-lru for cache
  appendOnly: true
  appendFsync: "everysec"
  save:
    - "900 1"
    - "300 10"
    - "60 10000"
  extra: |
    # tcp-keepalive 300
    # client-output-buffer-limit replica 256mb 64mb 60

# ── Resources (tune to your workload) ───────────────────────────────────────
resources:
  requests:
    cpu: "500m"
    memory: "2Gi"
  limits:
    cpu: "2"
    memory: "2Gi"                      # match request for QoS=Guaranteed

# ── Storage ─────────────────────────────────────────────────────────────────
persistence:
  enabled: true
  storageClass: ""                     # TODO: empty = default SC, or e.g. "gp3"
  accessModes:
    - ReadWriteOnce
  size: "20Gi"
  annotations: {}

# ── Scheduling (multi-AZ + node-distinct) ───────────────────────────────────
podAntiAffinityPreset: "hard"          # one pod per node — requires nodes ≥ 6
topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: valkey-cluster
        app.kubernetes.io/instance: valkey-cluster

# ── PDB ─────────────────────────────────────────────────────────────────────
pdb:
  enabled: true
  maxUnavailable: 1

# ── NetworkPolicy (THIS IS THE BOUNDARY — fill in your clients) ─────────────
networkPolicy:
  enabled: true
  allowedClients:
    - namespaceSelector:               # TODO: replace with your real namespaces
        matchLabels:
          kubernetes.io/metadata.name: chat-services
    # - podSelector:
    #     matchLabels:
    #       app.kubernetes.io/part-of: chat

# ── Metrics (Prometheus Operator) ───────────────────────────────────────────
metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    labels:
      release: prometheus              # TODO: match your prom-operator selector
  prometheusRule:
    enabled: true
    labels:
      release: prometheus              # TODO: match your prom-operator selector

# ── Lifecycle ───────────────────────────────────────────────────────────────
lifecycle:
  gracefulShutdown:
    enabled: true
    timeoutSeconds: 60
terminationGracePeriodSeconds: 90      # must exceed gracefulShutdown.timeoutSeconds

# ── Probes (defaults are fine — tune startup for very large RDBs) ───────────
probes:
  liveness:
    enabled: true
    initialDelaySeconds: 20
    periodSeconds: 10
  readiness:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 5
  startup:
    enabled: true
    failureThreshold: 60              # 5min × maxmemory ÷ 1Gi for slow loads

# ── Pod hardening (don't relax these without a reason) ──────────────────────
podSecurityContext:
  runAsUser: 1000
  runAsGroup: 1000
  runAsNonRoot: true
  fsGroup: 1000
  fsGroupChangePolicy: "OnRootMismatch"
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
  runAsNonRoot: true

# ── Operational labels (helps with multi-cluster discovery) ─────────────────
commonLabels:
  team: platform
  env: prod
partOf: "chat"

# ── Init containers (enable only if your storage class needs it) ────────────
initContainers:
  volumePermissions:
    enabled: false                     # most modern CSI drivers honor fsGroup
  sysctl:
    enabled: false                     # only needed on bare-metal / specific tuning
