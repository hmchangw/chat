apiVersion: v2
name: valkey-cluster
description: |
  In-house Helm chart that deploys Valkey in cluster mode on the upstream
  valkey/valkey image. Targets in-cluster clients only; pairs with a
  NetworkPolicy that defaults to deny-all and is opt-in per release.
type: application
version: 0.1.0
appVersion: "8.1.7"
kubeVersion: ">=1.25.0-0"
home: https://valkey.io
sources:
  - https://github.com/valkey-io/valkey
maintainers:
  - name: chat-platform
keywords:
  - valkey
  - cluster
  - cache
  - kvstore
